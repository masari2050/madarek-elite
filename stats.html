*{font-family:'Tajawal',sans-serif;box-sizing:border-box}
body{background:linear-gradient(135deg,#0f0a2e 0%,#1a1145 30%,#1e1550 50%,#151040 70%,#0d0825 100%);min-height:100vh;color:white}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
.bar-track{height:8px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1.1s cubic-bezier(0.4,0,0.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .45s ease forwards}
.tab-btn{transition:all .2s;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;font-family:Tajawal,sans-serif}
.tab-btn.on{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;border-color:transparent}
.t-row{border-radius:14px;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:background .2s,transform .2s;margin-bottom:10px}
.t-row:hover{background:rgba(255,255,255,0.08);transform:translateX(-3px)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 1.8s infinite}
@keyframes spin-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glow-pulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,0.35)}50%{box-shadow:0 8px 32px rgba(99,102,241,0.6)}}

<script>
var SB=window.supabase.createClient('https://czzcmbxejxbotjemyuqf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emNtYnhlanhib3RqZW15dXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzQ0ODEsImV4cCI6MjA4NTc1MDQ4MX0.xDfG1qsDZGyUrpL44JfqOtk57dVsLaMsvIzJz1KgiR0');
var TN={algebra:'جبر',arithmetic:'حساب',geometry:'هندسة',statistics:'إحصاء',analogy:'تناظر لفظي',comprehension:'استيعاب مقروء',sentence_completion:'إكمال جمل',biology:'أحياء',chemistry:'كيمياء',physics:'فيزياء',math:'رياضيات'};
var TI={algebra:'🔢',arithmetic:'➕',geometry:'📐',statistics:'📊',analogy:'🔗',comprehension:'📚',sentence_completion:'✍️',biology:'🧬',chemistry:'⚗️',physics:'⚡',math:'📏'};
var SN={quant:'كمي',verbal:'لفظي',tahsili:'تحصيلي'};
var attempts=[],tmap={},activeTab='all';
async function init(){var sess=await SB.auth.getSession();if(!sess.data.session){location.href='login.html';return}var res=await SB.from('attempts').select('is_correct,answered_at,questions(section,topic)').eq('user_id',sess.data.session.user.id).order('answered_at',{ascending:false});if(!res.data||res.data.length===0){document.getElementById('loadEl').innerHTML='<div style="padding:60px 20px;text-align:center;color:rgba(255,255,255,0.3)"><div style="font-size:48px;margin-bottom:16px">📭</div><div style="margin-bottom:20px;font-size:16px">ما حليت أسئلة بعد!</div><a href="select-section.html" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;text-decoration:none;border-radius:99px;padding:12px 28px;font-weight:700">ابدأ التدريب</a></div>';return}attempts=res.data;buildMap();renderSummary();renderTopics();document.getElementById('loadEl').style.display='none';document.getElementById('app').style.display='block'}
function buildMap(){tmap={};attempts.forEach(function(a){if(!a.questions)return;var k=(a.questions.section||'x')+'__'+(a.questions.topic||'other');if(!tmap[k])tmap[k]={s:a.questions.section||'x',t:a.questions.topic||'other',n:0,c:0};tmap[k].n++;if(a.is_correct)tmap[k].c++})}
function renderSummary(){var tot=attempts.length,cor=attempts.filter(function(a){return a.is_correct}).length,pct=tot>0?Math.round(cor/tot*100):0;document.getElementById('tEl').textContent=tot;document.getElementById('cEl').textContent=cor;document.getElementById('wEl').textContent=tot-cor;document.getElementById('pctEl').textContent=pct+'%';var lbl=pct>=80?'🌟 ممتاز!':pct>=65?'💪 جيد':pct>=50?'📈 متوسط':'🚀 في تطور';document.getElementById('lblEl').textContent=lbl;var color=pct>=70?'#4ade80':pct>=50?'#fbbf24':'#f87171';var ring=document.getElementById('ringEl');ring.style.stroke=color;setTimeout(function(){ring.style.strokeDashoffset=251.2-(pct/100)*251.2},100);var arr=Object.values(tmap).filter(function(x){return x.n>=3});if(arr.length>0){arr.sort(function(a,b){return(b.c/b.n)-(a.c/a.n)});var best=arr[0],worst=arr[arr.length-1];document.getElementById('bIcon').textContent=TI[best.t]||'⭐';document.getElementById('bName').textContent=TN[best.t]||best.t;document.getElementById('bPct').textContent=Math.round(best.c/best.n*100)+'% ('+best.c+'/'+best.n+')';document.getElementById('kIcon').textContent=TI[worst.t]||'⚠️';document.getElementById('kName').textContent=TN[worst.t]||worst.t;document.getElementById('kPct').textContent=Math.round(worst.c/worst.n*100)+'% ('+worst.c+'/'+worst.n+')'}}
function renderTopics(){var el=document.getElementById('topicsEl');el.innerHTML='';var list=Object.values(tmap).filter(function(x){return activeTab==='all'||x.s===activeTab}).sort(function(a,b){return(b.c/b.n)-(a.c/a.n)});if(list.length===0){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.3);padding:40px">لا توجد بيانات بعد</div>';return}if(activeTab==='all'){var secs=[];list.forEach(function(x){if(secs.indexOf(x.s)<0)secs.push(x.s)});secs.forEach(function(sec){var h=document.createElement('div');h.style.cssText='font-size:11px;font-weight:700;color:rgba(255,255,255,0.25);padding:10px 4px 4px;letter-spacing:1.5px;';h.textContent='— '+(SN[sec]||sec).toUpperCase()+' —';el.appendChild(h);list.filter(function(x){return x.s===sec}).forEach(function(x,i){addRow(x,i,el)})})}else{list.forEach(function(x,i){addRow(x,i,el)})}}
function addRow(x,i,el){var pct=x.n>0?Math.round(x.c/x.n*100):0,color=pct>=75?'#4ade80':pct>=50?'#fbbf24':'#f87171',label=pct>=75?'ممتاز ✅':pct>=50?'متوسط ⚡':'يراجع ⚠️';var row=document.createElement('div');row.className='t-row';row.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="display:flex;align-items:center;gap:12px"><div style="width:42px;height:42px;background:rgba(255,255,255,0.06);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">'+(TI[x.t]||'📌')+'</div><div><div style="font-weight:700;font-size:14px">'+(TN[x.t]||x.t)+'</div><div style="font-size:11px;color:rgba(255,255,255,0.3)">'+x.n+' سؤال • '+(SN[x.s]||x.s)+'</div></div></div><div style="text-align:left"><div style="font-size:24px;font-weight:900;color:'+color+';line-height:1.1">'+pct+'%</div><div style="font-size:11px;color:'+color+'">'+label+'</div></div></div><div class="bar-track"><div class="bar-fill" style="width:0%;background:linear-gradient(90deg,'+color+'60,'+color+');" data-w="'+pct+'"></div></div><div style="display:flex;gap:16px;margin-top:8px;font-size:12px"><span style="color:#4ade8070">✅ '+x.c+' صح</span><span style="color:#f8717170">❌ '+(x.n-x.c)+' خطأ</span></div>';el.appendChild(row);setTimeout(function(){var fill=row.querySelector('.bar-fill');if(fill)fill.style.width=fill.getAttribute('data-w')+'%'},80+i*50)}
function switchTab(tab){activeTab=tab;document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on')});document.getElementById('tab-'+tab).classList.add('on');renderTopics()}
function showReport(){var el=document.getElementById('reportEl'),txt=document.getElementById('reportTxt');el.style.display='block';el.scrollIntoView({behavior:'smooth'});var tot=attempts.length,cor=attempts.filter(function(a){return a.is_correct}).length,overall=tot>0?Math.round(cor/tot*100):0,arr=Object.values(tmap);var strong=arr.filter(function(x){return x.n>=3&&Math.round(x.c/x.n*100)>=70}).sort(function(a,b){return(b.c/b.n)-(a.c/a.n)});var weak=arr.filter(function(x){return x.n>=3&&Math.round(x.c/x.n*100)<50}).sort(function(a,b){return(a.c/a.n)-(b.c/b.n)});var mid=arr.filter(function(x){return x.n>=3&&Math.round(x.c/x.n*100)>=50&&Math.round(x.c/x.n*100)<70});var r='';if(overall>=80)r+='🌟 أداء رائع! نسبتك '+overall+'% تعكس استعداداً قوياً للاختبار.\n\n';else if(overall>=60)r+='💪 أداء جيد! حققت '+overall+'% من '+tot+' سؤال — أنت على الطريق الصح.\n\n';else if(overall>=40)r+='📈 بداية واعدة! نسبتك '+overall+'% وأمامك مساحة كبيرة للتحسن.\n\n';else r+='🚀 مرحلة البناء! '+overall+'% — كل سؤال تحله يضيف لرصيدك.\n\n';if(strong.length>0){r+='✅ نقاط القوة:\n';strong.forEach(function(x){r+='• '+(TN[x.t]||x.t)+': '+Math.round(x.c/x.n*100)+'% ('+x.c+'/'+x.n+') 🔥\n'});r+='\n'}if(mid.length>0){r+='⚡ تحتاج تطوير:\n';mid.forEach(function(x){r+='• '+(TN[x.t]||x.t)+': '+Math.round(x.c/x.n*100)+'% — زِد التدريب\n'});r+='\n'}if(weak.length>0){r+='⚠️ تحتاج مراجعة عاجلة:\n';weak.forEach(function(x){r+='• '+(TN[x.t]||x.t)+': '+Math.round(x.c/x.n*100)+'% — ركّز هنا أولاً\n'});r+='\n'}r+='📋 خطتك للأسبوع:\n';if(weak.length>0){r+='1. ابدأ بـ '+(TN[weak[0].t]||weak[0].t)+' — 20 سؤال يومياً\n';r+=weak.length>1?'2. راجع '+(TN[weak[1].t]||weak[1].t)+' — 15 سؤال يومياً\n':'2. راجع المواضيع المتوسطة لرفعها\n'}else{r+='1. حافظ على مستواك بـ 20 سؤال يومياً\n2. جرّب وضع محاكاة الاختبار الكامل\n'}r+='3. راجع أخطاءك قبل كل جلسة جديدة\n\n';var tips=['كل سؤال تحله اليوم هو خطوة نحو النتيجة اللي تحلم فيها 🎯','النجاح في قياس مو حظ، هو تراكم جهد متواصل 💫','الفرق بين أين أنت وأين تريد يكمن فيما ستفعله اليوم 🚀','كل يوم تدرب فيه هو يوم تقدمت — استمر! 🌟'];r+=tips[Math.floor(Math.random()*tips.length)];txt.textContent='';var i=0,chars=r.split(''),timer=setInterval(function(){if(i<chars.length)txt.textContent+=chars[i++];else clearInterval(timer)},10)}
