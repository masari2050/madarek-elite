<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="manifest" href="manifest.json">

<title>مدارك النخبة | إحصائياتي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{font-family:'Tajawal',sans-serif;box-sizing:border-box}
html{overflow-y:scroll}
body{background:linear-gradient(135deg,#0f0a2e 0%,#1a1145 30%,#1e1550 50%,#151040 70%,#0d0825 100%);min-height:100vh;color:white}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08);border-radius:20px}
.bar-track{height:8px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1.1s cubic-bezier(0.4,0,0.2,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .45s ease forwards}
.tab-btn{transition:all .2s;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.1);background:transparent;cursor:pointer;font-family:Tajawal,sans-serif}
.tab-btn.on{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;border-color:transparent}
.t-row{border-radius:14px;padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:background .2s;margin-bottom:10px}
/* Ring */
.ring-bg{fill:none;stroke:rgba(255,255,255,0.08)}
.ring-fill{fill:none;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
/* Sparkline dots */
.spark{display:inline-block;width:7px;height:7px;border-radius:50%;margin:0 1px}
.spark-g{background:#4ade80}
.spark-r{background:#f87171}
.spark-x{background:rgba(255,255,255,0.1)}
/* Strength map */
.str-item{padding:10px 12px;border-radius:12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
/* Period dropdown */
.period-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;font-family:Tajawal,sans-serif;transition:all .2s}
.period-btn.on{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#a5b4fc}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pulse{animation:pulse 1.8s infinite}
/* Logo anims */
@keyframes spin-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes glow-pulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,0.25)}50%{box-shadow:0 8px 32px rgba(99,102,241,0.45)}}
</style>
</head>
<body data-page="stats">

<!-- Header -->
<div style="background:rgba(15,10,46,0.96);backdrop-filter:blur(10px);position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,0.07)">
  <div style="max-width:800px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between">
    <a href="dashboard.html" style="color:rgba(255,255,255,0.45);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:5px">
      <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>رجوع
    </a>
    <a href="dashboard.html" style="display:inline-flex;align-items:center;gap:9px;direction:rtl;text-decoration:none">
      <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1e1b4b,#2d2564);border:1px solid rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;position:relative;animation:glow-pulse 3s ease-in-out infinite">
        <div style="position:absolute;inset:3px;border-radius:5px;padding:1.5px;background:conic-gradient(from 330deg,rgba(99,102,241,0.9) 0deg,rgba(139,92,246,0.5) 120deg,transparent 150deg,transparent 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:spin-ring 3s linear infinite;pointer-events:none"></div>
        <svg viewBox="0 0 36 36" width="15" height="15" fill="none">
          <path d="M5 26 L5 14 L11.5 20 L18 7 L24.5 20 L31 14 L31 26 Z" stroke="rgba(165,180,252,0.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="5" y1="28.5" x2="31" y2="28.5" stroke="rgba(165,180,252,0.7)" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="5" cy="14" r="2.5" fill="#a5b4fc"/><circle cx="18" cy="7" r="2.5" fill="#c4b5fd"/><circle cx="31" cy="14" r="2.5" fill="#a5b4fc"/>
        </svg>
      </div>
      <span style="font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;background:linear-gradient(110deg,#c7d2fe 0%,#e0e7ff 20%,#818cf8 45%,#c4b5fd 70%,#c7d2fe 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite">مدارك النخبة</span>
    </a>
    <div style="width:60px"></div>
  </div>
</div>

<div id="loadEl" style="text-align:center;padding:80px 20px;color:rgba(255,255,255,0.3);min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.2s ease">
  <div style="font-size:36px;margin-bottom:12px">⏳</div>
  <div class="pulse">جاري تحميل إحصائياتك...</div>
</div>

<div id="app" style="display:none;max-width:800px;margin:0 auto;padding:20px 16px 60px;opacity:0;transition:opacity 0.3s ease">

  <!-- Title + Period Filter -->
  <div class="fu" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
    <h1 style="font-family:'Cairo',sans-serif;font-size:20px;font-weight:900;margin:0">📊 إحصائياتي</h1>
    <div style="display:flex;gap:6px">
      <button class="period-btn" id="p-week" onclick="setPeriod('week')">هذا الأسبوع</button>
      <button class="period-btn" id="p-month" onclick="setPeriod('month')">هذا الشهر</button>
      <button class="period-btn on" id="p-all" onclick="setPeriod('all')">الكل</button>
    </div>
  </div>

  <!-- ═══ Performance Card ═══ -->
  <div class="glass fu" style="padding:24px;margin-bottom:16px;text-align:center">
    <!-- Level badge -->
    <div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;margin-bottom:12px" id="levelBadge">
      <span id="lvlEmoji" style="font-size:18px">🌱</span>
      <span id="lvlName" style="font-size:13px;font-weight:800">المستوى 1 — مبتدئ</span>
    </div>

    <!-- Big Ring -->
    <div style="position:relative;width:120px;height:120px;margin:0 auto 12px">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" class="ring-bg" stroke-width="8"/>
        <circle id="ringEl" cx="60" cy="60" r="50" class="ring-fill" stroke="#7c3aed" stroke-width="8"
            stroke-dasharray="314.16" stroke-dashoffset="314.16" transform="rotate(-90 60 60)"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div id="pctEl" style="font-family:'Cairo',sans-serif;font-size:28px;font-weight:900;line-height:1">0%</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.35)">نسبة النجاح</div>
      </div>
    </div>

    <!-- Stats row -->
    <div style="display:flex;justify-content:center;gap:20px;font-size:14px;margin-bottom:12px">
      <span style="color:#4ade80">✅ <b id="cEl">0</b> صح</span>
      <span style="color:#f87171">❌ <b id="wEl">0</b> خطأ</span>
      <span style="color:rgba(255,255,255,0.4)">📝 <b id="tEl">0</b> سؤال</span>
    </div>

    <!-- Improvement indicator -->
    <div id="improveBox" class="hidden" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:700">
      <span id="improveIcon">📈</span>
      <span id="improveTxt">نسبتك تحسنت</span>
    </div>
  </div>

  <!-- ═══ Strength Map ═══ -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px" class="fu">
    <div class="glass" style="padding:16px">
      <div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>💪</span> نقاط قوتك
      </div>
      <div id="strengthList">
        <p style="font-size:12px;color:rgba(255,255,255,0.2)">—</p>
      </div>
    </div>
    <div class="glass" style="padding:16px">
      <div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <span>🎯</span> ركّز عليها
      </div>
      <div id="weaknessList">
        <p style="font-size:12px;color:rgba(255,255,255,0.2)">—</p>
      </div>
    </div>
  </div>

  <!-- ═══ زر التقرير الذكي ═══ -->
  <div class="fu" style="margin-bottom:20px">
    <button onclick="openSmartReport()" style="width:100%;padding:18px 20px;background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(79,70,229,0.15));border:1px solid rgba(124,58,237,0.3);border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s" onmouseover="this.style.background='linear-gradient(135deg,rgba(124,58,237,0.3),rgba(79,70,229,0.25))'" onmouseout="this.style.background='linear-gradient(135deg,rgba(124,58,237,0.2),rgba(79,70,229,0.15))'">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:28px">📊</span>
        <div style="text-align:right">
          <p style="font-size:15px;font-weight:800;color:white;margin:0;font-family:'Cairo',sans-serif">تقريرك الذكي</p>
          <p style="font-size:11px;color:rgba(196,181,253,0.6);margin:0">تحليل مفصّل لأدائك + خطة تدريب مخصصة</p>
        </div>
      </div>
      <span style="font-size:20px;color:rgba(196,181,253,0.4)">←</span>
    </button>
  </div>

  <!-- ═══ Tabs ═══ -->
  <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap" class="fu">
    <button class="tab-btn on" id="tab-all" onclick="switchTab('all')">الكل</button>
    <button class="tab-btn" id="tab-quant" onclick="switchTab('quant')">⚡ كمي</button>
    <button class="tab-btn" id="tab-verbal" onclick="switchTab('verbal')">📖 لفظي</button>
    <button class="tab-btn" id="tab-tahsili" onclick="switchTab('tahsili')">🎓 تحصيلي</button>
  </div>

  <!-- ═══ Topics List ═══ -->
  <div id="topicsEl" class="fu"></div>

</div>

<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script>
<script src="gamification.js"></script>
<script>
var SB=window.supabase.createClient('https://czzcmbxejxbotjemyuqf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emNtYnhlanhib3RqZW15dXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzQ0ODEsImV4cCI6MjA4NTc1MDQ4MX0.xDfG1qsDZGyUrpL44JfqOtk57dVsLaMsvIzJz1KgiR0');
var TN={algebra:'جبر',arithmetic:'حساب',geometry:'هندسة',statistics:'إحصاء',probability:'إحصاء واحتمال',patterns:'أنماط',analogy:'تناظر لفظي',comprehension:'استيعاب مقروء',sentence_completion:'إكمال جمل',error_detection:'خطأ سياقي',biology:'أحياء',chemistry:'كيمياء',physics:'فيزياء',math:'رياضيات',other:'أخرى'};
var TI={algebra:'🔢',arithmetic:'➕',geometry:'📐',statistics:'📊',probability:'🎲',patterns:'🔄',analogy:'🔗',comprehension:'📚',sentence_completion:'✍️',error_detection:'🔍',biology:'🧬',chemistry:'⚗️',physics:'⚡',math:'📏',other:'📌'};
var SN={quant:'كمي',verbal:'لفظي',tahsili:'تحصيلي'};
var allAttempts=[],filteredAttempts=[],tmap={},activeTab='all',activePeriod='all',studentName='';

async function init(){
    var session=await window._madarekRestoreSession(SB);
    if(!session){location.href='login.html';return}
    // جلب اسم الطالب
    try{
        var prof=await SB.from('profiles').select('full_name').eq('id',session.user.id).single();
        if(prof.data&&prof.data.full_name) studentName=prof.data.full_name.split(' ')[0];
    }catch(e){}
    if(!studentName&&session.user.user_metadata&&session.user.user_metadata.name) studentName=session.user.user_metadata.name.split(' ')[0];
    if(!studentName) studentName=session.user.email?session.user.email.split('@')[0]:'';
    var res=await SB.from('attempts').select('is_correct,answered_at,questions(section,topic)').eq('user_id',session.user.id).order('answered_at',{ascending:false});
    if(!res.data||res.data.length===0){
        document.getElementById('loadEl').innerHTML='<div style="padding:60px 20px;text-align:center;color:rgba(255,255,255,0.3)"><div style="font-size:48px;margin-bottom:16px">📭</div><div style="margin-bottom:20px;font-size:16px">ما حليت أسئلة بعد!</div><a href="select-section.html" style="background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;text-decoration:none;border-radius:99px;padding:12px 28px;font-weight:700">ابدأ التدريب</a></div>';
        return;
    }
    allAttempts=res.data;
    applyPeriodFilter();
    document.getElementById('loadEl').style.opacity='0';
    setTimeout(function(){
        document.getElementById('loadEl').style.display='none';
        var appEl=document.getElementById('app');
        appEl.style.display='block';
        requestAnimationFrame(function(){ appEl.style.opacity='1'; });
    }, 200);
}

function applyPeriodFilter(){
    if(activePeriod==='all'){
        filteredAttempts=allAttempts;
    } else {
        var cutoff=new Date();
        if(activePeriod==='week') cutoff.setDate(cutoff.getDate()-7);
        else if(activePeriod==='month') cutoff.setMonth(cutoff.getMonth()-1);
        filteredAttempts=allAttempts.filter(function(a){return a.answered_at && new Date(a.answered_at)>=cutoff});
    }
    buildMap();
    renderAll();
}

function setPeriod(p){
    activePeriod=p;
    document.querySelectorAll('.period-btn').forEach(function(b){b.classList.remove('on')});
    document.getElementById('p-'+p).classList.add('on');
    applyPeriodFilter();
}

function buildMap(){
    tmap={};
    filteredAttempts.forEach(function(a){
        if(!a.questions)return;
        var k=(a.questions.section||'x')+'__'+(a.questions.topic||'other');
        if(!tmap[k])tmap[k]={s:a.questions.section||'x',t:a.questions.topic||'other',n:0,c:0,history:[]};
        tmap[k].n++;
        if(a.is_correct)tmap[k].c++;
        tmap[k].history.push(a.is_correct);
    });
}

function renderAll(){
    renderSummary();
    renderStrengthMap();
    renderTopics();
}

function renderSummary(){
    var tot=filteredAttempts.length;
    var cor=filteredAttempts.filter(function(a){return a.is_correct}).length;
    var pct=tot>0?Math.round(cor/tot*100):0;
    document.getElementById('tEl').textContent=tot;
    document.getElementById('cEl').textContent=cor;
    document.getElementById('wEl').textContent=tot-cor;
    document.getElementById('pctEl').textContent=pct+'%';

    var color=pct>=70?'#4ade80':pct>=50?'#fbbf24':'#a78bfa';
    var ring=document.getElementById('ringEl');
    ring.style.stroke=color;
    var circumference=314.16;
    setTimeout(function(){ring.style.strokeDashoffset=circumference-(pct/100)*circumference},100);

    // Level badge
    if(window.Gamification){
        var totalXP=Gamification.calculateXP(allAttempts,0);
        var lvl=Gamification.calculateLevel(totalXP);
        document.getElementById('lvlEmoji').textContent=lvl.emoji;
        document.getElementById('lvlName').textContent='المستوى '+lvl.level+' — '+lvl.nameAr;
        document.getElementById('levelBadge').style.background='rgba(255,255,255,0.06)';
        document.getElementById('levelBadge').style.border='1px solid '+lvl.color+'40';
        document.getElementById('lvlName').style.color=lvl.color;
    }

    // Improvement indicator
    var box=document.getElementById('improveBox');
    if(allAttempts.length>=100){
        var recent50=allAttempts.slice(0,50);
        var prev50=allAttempts.slice(50,100);
        var r50c=recent50.filter(function(a){return a.is_correct}).length;
        var p50c=prev50.filter(function(a){return a.is_correct}).length;
        var diff=Math.round((r50c-p50c)/50*100);
        box.classList.remove('hidden');
        box.style.display='inline-flex';
        if(diff>0){
            box.style.background='rgba(74,222,128,0.1)';
            box.style.border='1px solid rgba(74,222,128,0.2)';
            document.getElementById('improveIcon').textContent='📈';
            document.getElementById('improveTxt').innerHTML='نسبتك تحسنت <b style="color:#4ade80">'+diff+'%</b> عن آخر 50 سؤال';
            document.getElementById('improveTxt').style.color='#86efac';
        } else if(diff<0){
            box.style.background='rgba(251,191,36,0.1)';
            box.style.border='1px solid rgba(251,191,36,0.2)';
            document.getElementById('improveIcon').textContent='📉';
            document.getElementById('improveTxt').innerHTML='شد حيلك! نسبتك نزلت <b style="color:#fbbf24">'+Math.abs(diff)+'%</b> — ركّز أكثر';
            document.getElementById('improveTxt').style.color='#fde68a';
        } else {
            box.style.background='rgba(255,255,255,0.06)';
            box.style.border='1px solid rgba(255,255,255,0.1)';
            document.getElementById('improveIcon').textContent='➡️';
            document.getElementById('improveTxt').innerHTML='نسبتك ثابتة — حاول ترفعها!';
            document.getElementById('improveTxt').style.color='rgba(255,255,255,0.5)';
        }
    }
}

function renderStrengthMap(){
    var arr=Object.values(tmap).filter(function(x){return x.n>=3});
    var strong=arr.filter(function(x){return Math.round(x.c/x.n*100)>=60}).sort(function(a,b){return(b.c/b.n)-(a.c/a.n)});
    var weak=arr.filter(function(x){return Math.round(x.c/x.n*100)<50}).sort(function(a,b){return(a.c/a.n)-(b.c/b.n)});

    var sEl=document.getElementById('strengthList');
    if(strong.length>0){
        var sh='';
        strong.slice(0,3).forEach(function(x){
            var pct=Math.round(x.c/x.n*100);
            sh+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'
                +'<span style="font-size:14px">'+(TI[x.t]||'⭐')+'</span>'
                +'<span style="font-size:12px;font-weight:700;flex:1">'+(TN[x.t]||x.t)+'</span>'
                +'<span style="font-size:12px;font-weight:800;color:#4ade80">'+pct+'%</span>'
                +'</div>';
        });
        sEl.innerHTML=sh;
    } else {
        sEl.innerHTML='<p style="font-size:11px;color:rgba(255,255,255,0.2)">حل أسئلة أكثر!</p>';
    }

    var wEl=document.getElementById('weaknessList');
    if(weak.length>0){
        var wh='';
        weak.slice(0,3).forEach(function(x){
            var pct=Math.round(x.c/x.n*100);
            wh+='<div style="margin-bottom:8px">'
                +'<div style="display:flex;align-items:center;gap:6px">'
                +'<span style="font-size:14px">'+(TI[x.t]||'📌')+'</span>'
                +'<span style="font-size:12px;font-weight:700;flex:1">'+(TN[x.t]||x.t)+'</span>'
                +'<span style="font-size:12px;font-weight:800;color:#fbbf24">'+pct+'%</span>'
                +'</div>'
                +'<p style="font-size:10px;color:rgba(251,191,36,0.6);margin:2px 0 0 20px">شد حيلك! 💪</p>'
                +'</div>';
        });
        wh+='<a href="select-section.html" style="display:block;text-align:center;padding:6px;font-size:11px;font-weight:700;color:#818cf8;border:1px solid rgba(99,102,241,0.2);border-radius:10px;text-decoration:none;margin-top:4px">تدرّب عليها →</a>';
        wEl.innerHTML=wh;
    } else {
        wEl.innerHTML='<p style="font-size:11px;color:rgba(255,255,255,0.2)">ممتاز! لا ضعف واضح</p>';
    }
}

function renderTopics(){
    var el=document.getElementById('topicsEl');
    el.innerHTML='';
    var list=Object.values(tmap).filter(function(x){return activeTab==='all'||x.s===activeTab}).sort(function(a,b){return b.n-a.n});
    if(list.length===0){el.innerHTML='<div style="text-align:center;color:rgba(255,255,255,0.3);padding:40px">لا توجد بيانات</div>';return}

    if(activeTab==='all'){
        var secs=[];
        list.forEach(function(x){if(secs.indexOf(x.s)<0)secs.push(x.s)});
        secs.forEach(function(sec){
            var secTotal=list.filter(function(x){return x.s===sec}).reduce(function(s,x){return s+x.n},0);
            var h=document.createElement('div');
            h.style.cssText='font-size:11px;font-weight:700;color:rgba(255,255,255,0.25);padding:10px 4px 4px;letter-spacing:1.5px;display:flex;justify-content:space-between';
            h.innerHTML='<span>— '+(SN[sec]||sec).toUpperCase()+' —</span><span style="font-weight:400">'+secTotal+' سؤال</span>';
            el.appendChild(h);
            list.filter(function(x){return x.s===sec}).forEach(function(x,i){addRow(x,i,el)});
        });
    } else {
        list.forEach(function(x,i){addRow(x,i,el)});
    }
}

function addRow(x,i,el){
    var pct=x.n>0?Math.round(x.c/x.n*100):0;
    var color,label;
    if(x.n<3){
        color='rgba(255,255,255,0.3)';
        label='جرّب هالموضوع';
    } else if(pct>=75){
        color='#4ade80';
        label='ممتاز ✅';
    } else if(pct>=50){
        color='#fbbf24';
        label='جيد ⚡';
    } else {
        color='#fbbf24';
        label='شد حيلك 💪';
    }

    // Sparkline: last 10 answers
    var sparkHTML='';
    var history=x.history||[];
    var last10=history.slice(-10);
    for(var s=0;s<10;s++){
        if(s<last10.length){
            sparkHTML+='<span class="spark '+(last10[s]?'spark-g':'spark-r')+'"></span>';
        } else {
            sparkHTML+='<span class="spark spark-x"></span>';
        }
    }

    var row=document.createElement('div');
    row.className='t-row';
    row.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
        +'<div style="display:flex;align-items:center;gap:12px">'
        +'<div style="width:40px;height:40px;background:rgba(255,255,255,0.06);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px">'+(TI[x.t]||'📌')+'</div>'
        +'<div>'
        +'<div style="font-weight:700;font-size:14px">'+(TN[x.t]||x.t)+'</div>'
        +'<div style="font-size:11px;color:rgba(255,255,255,0.3)">'+x.n+' سؤال · '+(SN[x.s]||x.s)+'</div>'
        +'</div></div>'
        +'<div style="text-align:left">'
        +'<div style="font-size:22px;font-weight:900;color:'+color+';line-height:1.1">'+(x.n<3?'—':pct+'%')+'</div>'
        +'<div style="font-size:10px;color:'+color+'">'+label+'</div>'
        +'</div></div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:0%;background:linear-gradient(90deg,'+color+'60,'+color+');" data-w="'+pct+'"></div></div>'
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">'
        +'<div style="font-size:12px"><span style="color:#4ade8090">✅ '+x.c+'</span> <span style="color:#f8717190;margin-right:8px">❌ '+(x.n-x.c)+'</span></div>'
        +'<div style="display:flex;align-items:center;gap:2px" title="آخر 10 إجابات">'+sparkHTML+'</div>'
        +'</div>';
    el.appendChild(row);
    setTimeout(function(){var fill=row.querySelector('.bar-fill');if(fill)fill.style.width=fill.getAttribute('data-w')+'%'},80+i*50);
}

function switchTab(tab){
    activeTab=tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('on')});
    document.getElementById('tab-'+tab).classList.add('on');
    renderTopics();
}

function openSmartReport(){
    var tot=allAttempts.length;
    if(tot<3){alert('حل 3 أسئلة على الأقل عشان يظهر تقريرك');return}

    // بناء tmap من كل البيانات
    var rmap={};
    allAttempts.forEach(function(a){
        if(!a.questions)return;
        var k=(a.questions.section||'x')+'__'+(a.questions.topic||'other');
        if(!rmap[k])rmap[k]={s:a.questions.section||'x',t:a.questions.topic||'other',n:0,c:0};
        rmap[k].n++;if(a.is_correct)rmap[k].c++;
    });

    var cor=allAttempts.filter(function(a){return a.is_correct}).length;
    var pct=Math.round(cor/tot*100);
    var arr=Object.values(rmap);
    var strong=arr.filter(function(x){return x.n>=3&&Math.round(x.c/x.n*100)>=60}).sort(function(a,b){return(b.c/b.n)-(a.c/a.n)});
    var weak=arr.filter(function(x){return x.n>=3&&Math.round(x.c/x.n*100)<50}).sort(function(a,b){return(a.c/a.n)-(b.c/b.n)});
    var untried=arr.filter(function(x){return x.n<3});
    var name=studentName||'بطل';

    // تحديد لون وتصنيف الأداء
    var grade,gradeColor,gradeBg,gradeEmoji;
    if(pct>=80){grade='ممتاز';gradeColor='#4ade80';gradeBg='rgba(74,222,128,0.1)';gradeEmoji='🏆'}
    else if(pct>=65){grade='جيد جداً';gradeColor='#60a5fa';gradeBg='rgba(96,165,250,0.1)';gradeEmoji='⭐'}
    else if(pct>=50){grade='جيد';gradeColor='#fbbf24';gradeBg='rgba(251,191,36,0.1)';gradeEmoji='💪'}
    else if(pct>=35){grade='مقبول';gradeColor='#fb923c';gradeBg='rgba(251,146,60,0.1)';gradeEmoji='📈'}
    else{grade='يحتاج تركيز';gradeColor='#c4b5fd';gradeBg='rgba(196,181,253,0.1)';gradeEmoji='🎯'}

    // المستوى
    var lvlInfo=null;
    if(window.Gamification){

    // حساب التحسن

    else if(pct<70){tipTitle='⭐ نصيحة للتميّز';tip='مستواك جيد وقريب من الممتاز! السر الآن هو التنويع — جرّب أسئلة من كل الأقسام عشان ما يجيك سؤال جديد بالاختبار. الشمولية تفرق.';}
    else{tipTitle='👑 نصيحة البطل';tip='مستواك عالي ما شاء الله! الآن ركّز على السرعة — حط لنفسك وقت محدد لكل سؤال. بالاختبار الحقيقي، الوقت هو التحدي الأكبر.';}
    h+='<div class="rpt-sec" style="background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(79,70,229,0.08));border:1px solid rgba(124,58,237,0.2);border-radius:20px;padding:20px;margin-bottom:20px">';
    h+='<p style="font-size:14px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px">'+tipTitle+'</p>';
    h+='<p style="font-size:13px;color:rgba(255,255,255,0.6);line-height:2">'+tip+'</p>';
    h+='</div>';

    // ═══ زر إغلاق ═══
    h+='<button onclick="window.location.href=\'select-section.html\'" style="width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:white;border:none;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:Tajawal,sans-serif">فهمت — يلا نتدرب! 🚀</button>';

    h+='</div>'; // end container
    overlay.innerHTML=h;
    document.body.appendChild(overlay);
    overlay.scrollTop=0;
}

init();
