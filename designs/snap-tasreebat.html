<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>تسريبات — مدارك النخبة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden;font-family:'Cairo',sans-serif;background:#0d0825}

/* Background */
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#1a0a3e 0%,#0d0825 55%,#08041a 100%)}

/* Floating orbs */
@keyframes orbFloat1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.15)}}
@keyframes orbFloat2{0%,100%{transform:translate(0,0) scale(0.9)}50%{transform:translate(-15px,-25px) scale(1.05)}}
@keyframes orbFloat3{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-35px)}}
.orb{position:absolute;border-radius:50%;filter:blur(40px)}
.orb1{width:350px;height:350px;background:rgba(139,92,246,0.12);top:150px;right:-100px;animation:orbFloat1 8s ease-in-out infinite}
.orb2{width:250px;height:250px;background:rgba(249,115,22,0.1);bottom:350px;left:-60px;animation:orbFloat2 6s ease-in-out infinite}
.orb3{width:280px;height:280px;background:rgba(239,68,68,0.08);top:700px;left:40%;animation:orbFloat3 9s ease-in-out infinite}

/* Animations */
@keyframes fireFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.12)}}
@keyframes sparkRise{0%{transform:translateY(0) scale(0);opacity:0}25%{opacity:1;transform:translateY(-25px) scale(1)}100%{transform:translateY(-90px) scale(0);opacity:0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 40px rgba(249,115,22,0.3),0 0 80px rgba(249,115,22,0.1)}50%{box-shadow:0 0 60px rgba(249,115,22,0.5),0 0 120px rgba(239,68,68,0.15)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(50px)}100%{opacity:1;transform:translateY(0)}}
@keyframes shimmerLine{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glowRing{0%,100%{opacity:0.3}50%{opacity:0.7}}
@keyframes spinRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Shimmer top line */
.shimmer-top{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(249,115,22,0.7),rgba(239,68,68,0.5),rgba(139,92,246,0.4),transparent);background-size:200% 100%;animation:shimmerLine 3s infinite linear;z-index:50}

/* Content */
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:100px 70px;text-align:center}

/* Logo - Crown/Taj */
.logo-wrap{margin-bottom:55px;animation:slideUp 0.8s ease;position:relative}
.logo-box{width:160px;height:160px;background:linear-gradient(135deg,#1e1b4b,#2d2564);border-radius:40px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(99,102,241,0.15);position:relative;box-shadow:0 15px 50px rgba(99,102,241,0.2)}
.logo-box .glow-ring{position:absolute;inset:4px;border-radius:36px;padding:3px;background:conic-gradient(from 330deg,rgba(99,102,241,0.8) 0deg,rgba(139,92,246,0.4) 120deg,transparent 150deg,transparent 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:spinRing 4s linear infinite}

/* Fire */
.fire-wrap{margin-bottom:40px;animation:slideUp 0.8s ease 0.15s both}
.fire-big{font-size:130px;animation:fireFloat 2.5s ease-in-out infinite;display:block;filter:drop-shadow(0 0 30px rgba(249,115,22,0.5))}

/* Title */
.title{font-size:78px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:30px;animation:slideUp 0.8s ease 0.25s both;text-shadow:0 4px 40px rgba(0,0,0,0.4)}

/* Subtitle */
.subtitle{font-size:40px;font-weight:700;color:rgba(255,255,255,0.45);line-height:1.5;margin-bottom:55px;animation:slideUp 0.8s ease 0.35s both}

/* Date badges */
.dates{display:flex;gap:18px;margin-bottom:65px;animation:slideUp 0.8s ease 0.45s both;flex-wrap:wrap;justify-content:center}
.date-badge{background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(239,68,68,0.08));border:2px solid rgba(249,115,22,0.25);border-radius:18px;padding:16px 32px;color:#fb923c;font-size:34px;font-weight:800;backdrop-filter:blur(10px)}

/* CTA */
.cta{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-size:46px;font-weight:900;padding:30px 80px;border-radius:60px;border:none;animation:pulseGlow 2.5s infinite,slideUp 0.8s ease 0.55s both;text-decoration:none;display:inline-block;letter-spacing:0.5px}

/* Sparks */
.spark{position:absolute;width:5px;height:5px;border-radius:50%;animation:sparkRise 2.5s infinite}
.spark-orange{background:#f97316}
.spark-red{background:#ef4444}
.spark-yellow{background:#fbbf24}

/* Bottom brand */
.brand{position:absolute;bottom:70px;left:0;right:0;text-align:center;animation:slideUp 0.8s ease 0.7s both}
.brand-name{color:rgba(255,255,255,0.25);font-size:32px;font-weight:800}
.brand-url{color:rgba(139,92,246,0.4);font-size:26px;font-weight:700;margin-top:6px;display:block}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="shimmer-top"></div>

<!-- Sparks -->
<span class="spark spark-orange" style="top:380px;left:180px;animation-delay:0s"></span>
<span class="spark spark-red" style="top:400px;right:220px;animation-delay:0.6s"></span>
<span class="spark spark-yellow" style="top:850px;left:350px;animation-delay:1.1s"></span>
<span class="spark spark-orange" style="top:870px;right:300px;animation-delay:1.7s"></span>
<span class="spark spark-red" style="top:400px;left:500px;animation-delay:0.3s"></span>
<span class="spark spark-yellow" style="top:860px;left:550px;animation-delay:1.4s"></span>
<span class="spark spark-orange" style="top:500px;left:100px;animation-delay:2s"></span>
<span class="spark spark-red" style="top:500px;right:100px;animation-delay:0.9s"></span>

<div class="content">
    <!-- Logo Crown -->
    <div class="logo-wrap">
        <div class="logo-box">
            <div class="glow-ring"></div>
            <svg viewBox="0 0 36 36" width="90" height="90" fill="none">
                <path d="M5 26 L5 14 L11.5 20 L18 7 L24.5 20 L31 14 L31 26 Z" stroke="rgba(165,180,252,0.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="5" y1="28.5" x2="31" y2="28.5" stroke="rgba(165,180,252,0.7)" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="5" cy="14" r="2.5" fill="#a5b4fc"/>
                <circle cx="18" cy="7" r="2.5" fill="#c4b5fd"/>
                <circle cx="31" cy="14" r="2.5" fill="#a5b4fc"/>
            </svg>
        </div>
    </div>

    <!-- Fire -->
    <div class="fire-wrap">
        <span class="fire-big">🔥</span>
    </div>

    <!-- Title -->
    <h1 class="title">اختبر نفسك<br>بأسئلة جات فعلاً</h1>

    <!-- Subtitle -->
    <p class="subtitle">من أحدث تسريبات الأيام الماضية</p>

    <!-- Dates -->
    <div class="dates">
        <span class="date-badge">٢٤ مارس</span>
        <span class="date-badge">٢٦ مارس</span>
        <span class="date-badge">٢٨ مارس</span>
    </div>

    <!-- CTA -->
    <a class="cta">ابدأ الحين 🔥</a>

    <!-- Brand -->
    <div class="brand">
        <div class="brand-name">مدارك النخبة</div>
        <span class="brand-url">madarekelite.com</span>
    </div>
</div>
</body>
</html>
