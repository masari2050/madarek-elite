@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:#0d0825;color:#fff;padding:24px;min-height:100vh}

// ========================
// CLEANING FUNCTIONS
// ========================

function cleanText(text){
    if(!text) return text;
    var original=text;

    // === STEP 0: Extract and protect math expressions ===
    // Protect LaTeX-style formulas: \frac{...}, \sqrt{...}, etc.
    var mathSlots=[];
    function protectMath(match){
        var idx=mathSlots.length;
        mathSlots.push(match);
        return '%%MATH'+idx+'%%';
    }
    // Protect inline LaTeX expressions like \frac{a}{b}, \sqrt{x}, \text{...}
    text=text.replace(/\\(?:frac|sqrt|text|mathbb|mathrm|overline|underline|left|right|begin|end)\{[^}]*\}(?:\{[^}]*\})?/g,protectMath);
    // Protect standalone math symbols that might look like code
    text=text.replace(/\\(?:times|div|pm|mp|leq|geq|neq|approx|infty|alpha|beta|gamma|delta|theta|pi|sigma|omega|sum|prod|int|lim|log|ln|sin|cos|tan)\b/g,protectMath);

    // === STEP 1: Fix encoding issues ===
    text=text.replace(/&nbsp;/g,' ');
    text=text.replace(/&amp;/g,'&');
    text=text.replace(/&lt;/g,'<');
    text=text.replace(/&gt;/g,'>');
    text=text.replace(/&quot;/g,'"');
    text=text.replace(/&#(\d+);/g,function(_,n){return String.fromCharCode(n)});

    // === STEP 2: Extract text from KaTeX rendered HTML ===
    // Get the actual math content from annotation tags (LaTeX source)
    text=text.replace(/<annotation[^>]*encoding="application\/x-tex"[^>]*>([^<]*)<\/annotation>/gi,function(_,latex){
        return protectMath(latex.trim());
    });
    text=text.replace(/<annotation[^>]*>([^<]*)<\/annotation>/gi,'');
    // Remove the KaTeX HTML rendering (keep only the LaTeX from annotation)
    text=text.replace(/<span[^>]*class="katex-html"[^>]*>[\s\S]*?<\/span>(?=\s*<\/span>\s*<\/span>)/gi,'');
    // Remove remaining KaTeX/MathML wrappers but keep inner text
    text=text.replace(/<semantics[^>]*>(.*?)<\/semantics>/gi,'$1');
    text=text.replace(/<math[^>]*>(.*?)<\/math>/gi,'$1');
    text=text.replace(/<mrow[^>]*>(.*?)<\/mrow>/gi,'$1');
    text=text.replace(/<msup[^>]*>(.*?)<\/msup>/gi,'$1');
    text=text.replace(/<mfrac[^>]*>(.*?)<\/mfrac>/gi,'$1');
    text=text.replace(/<mn[^>]*>(.*?)<\/mn>/gi,'$1');
    text=text.replace(/<mi[^>]*>(.*?)<\/mi>/gi,'$1');
    text=text.replace(/<mo[^>]*>(.*?)<\/mo>/gi,'$1');

    // === STEP 3: Strip HTML tags but preserve content ===
    text=text.replace(/<br\s*\/?>/gi,'\n');
    text=text.replace(/<\/p>\s*<p[^>]*>/gi,'\n\n');
    text=text.replace(/<p[^>]*>/gi,'');
    text=text.replace(/<\/p>/gi,'\n');
    text=text.replace(/<\/div>\s*<div[^>]*>/gi,'\n');
    text=text.replace(/<div[^>]*>/gi,'');
    text=text.replace(/<\/div>/gi,'');
    text=text.replace(/<li[^>]*>/gi,'\n• ');
    text=text.replace(/<\/li>/gi,'');
    text=text.replace(/<\/?[uo]l[^>]*>/gi,'\n');
    text=text.replace(/<hr\s*\/?>/gi,'\n---\n');

    // === STEP 4: Remove all remaining HTML tags ===
    text=text.replace(/<[^>]+>/g,'');

    // === STEP 5: Restore protected math expressions ===
    text=text.replace(/%%MATH(\d+)%%/g,function(_,n){return mathSlots[parseInt(n)]});

    // === STEP 6: Clean up whitespace ===
    text=text.replace(/\n{3,}/g,'\n\n');
    text=text.replace(/[ \t]{2,}/g,' ');
    text=text.trim();

    return text;
}

// Safety check: extract numbers from text to verify nothing lost
function extractNumbers(text){
    if(!text) return [];
    // Remove HTML tags for comparison
    var plain=text.replace(/<[^>]+>/g,' ');
    var nums=plain.match(/[\d٠-٩]+(?:[.,/][\d٠-٩]+)*/g)||[];
    return nums.sort().join(',');
}

// Safety check: extract Arabic words
function extractArabicWords(text){
    if(!text) return '';
    var plain=text.replace(/<[^>]+>/g,' ');
    var words=plain.match(/[\u0600-\u06FF\u0750-\u077F]+/g)||[];
    return words.join(' ');
}

function getCleanedQuestion(q){
    var cleaned={};
    var changed=false;
    var warnings=[];

    // Clean question_text
    var newQ=cleanText(q.question_text||'');
    if(newQ!==(q.question_text||'')){
        // SAFETY: verify numbers are preserved
        var numsBefore=extractNumbers(q.question_text);
        var numsAfter=extractNumbers(newQ);
        if(numsBefore!==numsAfter){
            warnings.push('⚠️ أرقام مفقودة في السؤال');
        }
        // SAFETY: verify Arabic text is preserved
        var arBefore=extractArabicWords(q.question_text);
        var arAfter=extractArabicWords(newQ);
        if(arAfter.length<arBefore.length*0.7){
            warnings.push('⚠️ نص عربي مفقود في السؤال');
        }
        // SAFETY: don't save if cleaned text is too short (lost content)
        if(newQ.length>0 && newQ.length<(q.question_text||'').replace(/<[^>]+>/g,'').length*0.3){
            warnings.push('🚫 السؤال فقد أكثر من 70% من المحتوى — تخطي');
        }else{
            cleaned.question_text=newQ;
            changed=true;
        }
    }

    // Clean explanation
    var newE=cleanText(q.explanation||'');
    if(newE!==(q.explanation||'')){
        var numsBefore2=extractNumbers(q.explanation);
        var numsAfter2=extractNumbers(newE);
        if(numsBefore2!==numsAfter2){
            warnings.push('⚠️ أرقام مفقودة في الشرح');
        }
        if(newE.length>0 && newE.length<(q.explanation||'').replace(/<[^>]+>/g,'').length*0.3){
            warnings.push('🚫 الشرح فقد أكثر من 70% من المحتوى — تخطي');
        }else{
            cleaned.explanation=newE;
            changed=true;
        }
    }

    // Clean choices
    if(q.choices&&Array.isArray(q.choices)){
        var newChoices=q.choices.map(function(c){return cleanText(c||'')});
        var choicesChanged=false;
        var choicesSafe=true;
        q.choices.forEach(function(c,i){
            if(c!==newChoices[i]){
                choicesChanged=true;
                // Safety: choice should not become empty
                if(newChoices[i].length===0 && c.replace(/<[^>]+>/g,'').trim().length>0){
                    choicesSafe=false;
                    warnings.push('🚫 الخيار '+(i+1)+' أصبح فارغ — تخطي');
                }
            }
        });
        if(choicesChanged && choicesSafe){
            cleaned.choices=newChoices;
            changed=true;
        }
    }

    return {changed:changed,data:cleaned,warnings:warnings};
}

// ========================
// DETECTION PATTERNS
// ========================

var checks=[
    {
        name:'html',
        label:'أكواد HTML',
        pattern:/<\s*(span|div|p|br|strong|em|b|i|u|li|ul|ol|h[1-6]|a|img|table|tr|td|th|font|center|pre|code|blockquote|section|article|header|footer|nav|main|aside|figure|figcaption|sup|sub|mark|del|ins|small|big|abbr|cite|dfn|kbd|samp|var|details|summary|dialog|data|time|ruby|rt|rp|bdi|bdo|wbr|hr|meta|link|style|script|noscript|template|slot)[\s>\/]/i
    },
    {
        name:'css',
        label:'تنسيق CSS',
        pattern:/style\s*=\s*["']|font-size|font-family|text-align|color\s*:|background|margin|padding|display\s*:|class\s*=\s*["']|data-start|data-end|data-pm/i
    },
    {
        name:'katex',
        label:'KaTeX خام',
        pattern:/class\s*=\s*["']katex|\\frac\{|\\sqrt\{|\\text\{|\\mathbb|\\mathrm|<math\s|xmlns="http:\/\/www\.w3\.org|<annotation|<semantics|<mrow|<msup|<mfrac|\\begin\{|\\end\{|\\left|\\right|\\overline|\\underline/i
    },
    {
        name:'english',
        label:'إنجليزي غريب',
        test:function(text){
            var cleaned=text.replace(/\b(sin|cos|tan|log|ln|lim|max|min|cm|km|mm|mg|kg|Hz|pH|DNA|RNA|ATP|NaCl|CO2|H2O|O2|N2|Fe|Cu|Zn|Ca|Na|Cl|mol|sec|amp|watt|volt|ohm|joule|newton|pascal|kelvin|celsius|fahrenheit|mL|dL|nm|pm|AM|PM)\b/gi,'');
            var match=cleaned.match(/[a-zA-Z]{4,}(\s+[a-zA-Z]{3,}){2,}/g);
            return match&&match.length>0;
        }
    },
    {
        name:'encoding',
        label:'ترميز خاطئ',
        pattern:/&amp;|&lt;|&gt;|&nbsp;|&#\d+;|&[a-z]+;|Ã|Â|Ø|Ù|â€|Ã©|Ã¨|Ã¢|Ã®|Ã´|Ã»|Å|Ä|Ö|Ü|ÃŸ|\u00c3|\u00c2|\ufffd/i
    }
];

// ========================
// SCAN
// ========================

async function startScan(){
    var btn=document.getElementById('scan-btn');
    btn.disabled=true;
    btn.textContent='جاري الفحص...';
    document.getElementById('progress-wrap').style.display='block';
    document.getElementById('results').innerHTML='';
    document.getElementById('fix-log').style.display='none';
    document.getElementById('fix-log').innerHTML='';
    allBad=[];
    fixedCount=0;
    fixedIds={};
    document.getElementById('s-fixed').textContent='-';

    var allQ=[];
    var page=0;
    var pageSize=1000;
    var more=true;

    while(more){
        var{data,error}=await sb.from('questions')
            .select('id,question_text,choices,explanation,section,sub_section,created_at')
            .range(page*pageSize,(page+1)*pageSize-1)
            .order('created_at',{ascending:false});
        if(error||!data||data.length===0){more=false;break}
        allQ=allQ.concat(data);
        if(data.length<pageSize)more=false;
        page++;
        document.getElementById('progress-text').textContent='جاري جلب الأسئلة... '+allQ.length+' سؤال';
    }

    document.getElementById('s-total').textContent=allQ.length;

    for(var i=0;i<allQ.length;i++){
        var q=allQ[i];
        var issues=[];

        var textsToCheck=[
            {field:'السؤال',text:q.question_text||''},
            {field:'الشرح',text:q.explanation||''}
        ];
        if(q.choices&&Array.isArray(q.choices)){
            q.choices.forEach(function(c,ci){
                textsToCheck.push({field:'الخيار '+(ci+1),text:c||''});
            });
        }

        textsToCheck.forEach(function(item){
            if(!item.text)return;
            checks.forEach(function(check){
                var found=false;
                if(check.test){
                    found=check.test(item.text);
                }else{
                    found=check.pattern.test(item.text);
                }
                if(found){
                    var snippet='';
                    if(check.pattern){
                        var m=item.text.match(check.pattern);
                        if(m)snippet=m[0];
                    }
                    issues.push({
                        type:check.name,
                        label:check.label,
                        field:item.field,
                        snippet:snippet,
                        fullText:item.text
                    });
                }
            });
        });

        if(issues.length>0){
            allBad.push({question:q,issues:issues});
        }

        if(i%50===0||i===allQ.length-1){
            var pct=Math.round((i+1)/allQ.length*100);
            document.getElementById('progress-fill').style.width=pct+'%';
            document.getElementById('progress-text').textContent='جاري الفحص... '+pct+'% ('+allBad.length+' مشكلة)';
            await new Promise(function(r){setTimeout(r,0)});
        }
    }

    document.getElementById('s-bad').textContent=allBad.length;
    document.getElementById('s-good').textContent=allQ.length-allBad.length;
    document.getElementById('progress-text').textContent='اكتمل الفحص ✅';
    btn.disabled=false;
    btn.textContent='🔍 أعد الفحص';

    // Show fix button if there are issues
    if(allBad.length>0){
        document.getElementById('fix-btn').style.display='inline-block';
    }else{
        document.getElementById('fix-btn').style.display='none';
    }

    renderResults('all');
}

function confirmFixAll(){
    var count=allBad.filter(function(b){return !fixedIds[b.question.id]}).length;
    if(count===0){alert('كل المشاكل تم إصلاحها! ✅');return}

    var msg='⚠️ تأكيد التصحيح التلقائي\n\n';
    msg+='سيتم تنظيف '+count+' سؤال من:\n';
    msg+='• أكواد HTML (div, span, p, ...)\n';
    msg+='• تنسيقات CSS (style, class, ...)\n';
    msg+='• ترميزات خاطئة (&nbsp;, &amp;, ...)\n';
    msg+='• عناصر KaTeX الخام\n\n';
    msg+='هل تريد المتابعة؟';

    if(confirm(msg)){
        fixAll();
    }
}

async function fixAll(){
    var btn=document.getElementById('fix-btn');
    btn.disabled=true;
    btn.textContent='جاري الإصلاح...';

    var pFill=document.getElementById('progress-fill');
    var pText=document.getElementById('progress-text');
    pFill.classList.add('fixing');
    pFill.style.width='0%';
    document.getElementById('progress-wrap').style.display='block';

    var logEl=document.getElementById('fix-log');
    logEl.style.display='block';
    logEl.innerHTML='';

    var toFix=allBad.filter(function(b){return !fixedIds[b.question.id]});
    var successCount=0;
    var skipCount=0;
    var errorCount=0;

    for(var i=0;i<toFix.length;i++){
        var item=toFix[i];
        var q=item.question;

        var result=getCleanedQuestion(q);

        // Show warnings
        if(result.warnings&&result.warnings.length>0){
            result.warnings.forEach(function(w){
                addLog('⚠️ '+q.id.substring(0,8)+'... — '+w,'error');
            });
        }

        if(!result.changed){
            skipCount++;
            addLog('⏭️ '+q.id.substring(0,8)+'... — لا تغيير مطلوب','');
        }else{
            var{error}=await sb.from('questions').update(result.data).eq('id',q.id);

            if(error){
                errorCount++;
                addLog('❌ '+q.id.substring(0,8)+'... — خطأ: '+error.message,'error');
            }else{
                successCount++;
                fixedIds[q.id]=true;
                fixedCount++;

                // Update the local data too
                if(result.data.question_text!==undefined) q.question_text=result.data.question_text;
                if(result.data.explanation!==undefined) q.explanation=result.data.explanation;
                if(result.data.choices!==undefined) q.choices=result.data.choices;

                addLog('✅ '+q.id.substring(0,8)+'... — تم الإصلاح','success');
            }
        }

        // Update progress
        var pct=Math.round((i+1)/toFix.length*100);
        pFill.style.width=pct+'%';
        pText.textContent='جاري الإصلاح... '+pct+'% ('+successCount+' تم إصلاحه، '+errorCount+' خطأ)';

        // Prevent blocking UI
        if(i%10===0){
            await new Promise(function(r){setTimeout(r,0)});
        }
    }

    document.getElementById('s-fixed').textContent=fixedCount;
    pFill.classList.remove('fixing');
    pText.textContent='اكتمل الإصلاح ✅ — '+successCount+' تم إصلاحه، '+skipCount+' بدون تغيير، '+errorCount+' خطأ';

    btn.disabled=false;
    btn.textContent='🔧 إصلاح الكل تلقائياً';

    // Re-render
    renderResults(document.querySelector('.filter-btn.active').dataset.f);
}

function addLog(msg,cls){
    var el=document.getElementById('fix-log');
    var div=document.createElement('div');
    div.className='fix-log-item'+(cls?' '+cls:'');
    div.textContent=msg;
    el.insertBefore(div,el.firstChild);
}

// ========================
// FIX SINGLE (Preview Modal)
// ========================

function previewFix(idx){
    var item=allBad[idx];
    var q=item.question;
    currentPreview={idx:idx,item:item};

    var content='';

    // Question text
    var cleanedQ=cleanText(q.question_text||'');
    if(cleanedQ!==(q.question_text||'')){
        content+='<div class="preview-label before">🔴 السؤال — قبل:</div>';
        content+='<div class="preview-box" style="color:#fca5a5">'+escH(q.question_text||'')+'</div>';
        content+='<div class="preview-label after">🟢 السؤال — بعد:</div>';
        content+='<div class="preview-box" style="color:#86efac">'+escH(cleanedQ)+'</div>';
    }

    // Explanation
    var cleanedE=cleanText(q.explanation||'');
    if(cleanedE!==(q.explanation||'')){
        content+='<div class="preview-label before">🔴 الشرح — قبل:</div>';
        content+='<div class="preview-box" style="color:#fca5a5">'+escH((q.explanation||'').substring(0,500))+'</div>';
        content+='<div class="preview-label after">🟢 الشرح — بعد:</div>';
        content+='<div class="preview-box" style="color:#86efac">'+escH(cleanedE.substring(0,500))+'</div>';
    }

    // Choices
    if(q.choices&&Array.isArray(q.choices)){
        q.choices.forEach(function(c,ci){
            var cleanedC=cleanText(c||'');
            if(cleanedC!==c){
                content+='<div class="preview-label before">🔴 الخيار '+(ci+1)+' — قبل:</div>';
                content+='<div class="preview-box" style="color:#fca5a5">'+escH(c)+'</div>';
                content+='<div class="preview-label after">🟢 الخيار '+(ci+1)+' — بعد:</div>';
                content+='<div class="preview-box" style="color:#86efac">'+escH(cleanedC)+'</div>';
            }
        });
    }

    // Show warnings
    var result=getCleanedQuestion(q);
    if(result.warnings&&result.warnings.length>0){
        content+='<div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px;margin-top:12px">';
        content+='<div style="font-weight:700;color:#f87171;margin-bottom:6px">⚠️ تحذيرات الأمان:</div>';
        result.warnings.forEach(function(w){
            content+='<div style="font-size:13px;color:#fca5a5;padding:2px 0">'+escH(w)+'</div>';
        });
        content+='</div>';
    }

    if(!content){
        content='<div class="empty" style="padding:20px;font-size:14px">لا يوجد تغيير مطلوب لهذا السؤال</div>';
        document.getElementById('modal-fix-btn').style.display='none';
    }else{
        document.getElementById('modal-fix-btn').style.display='inline-block';
    }

    document.getElementById('modal-title').textContent='معاينة التصحيح — '+q.id.substring(0,8)+'...';
    document.getElementById('modal-content').innerHTML=content;
    document.getElementById('preview-modal').classList.add('show');
}

async function fixSingle(){
    if(!currentPreview)return;
    var q=currentPreview.item.question;
    var result=getCleanedQuestion(q);

    if(!result.changed){
        alert('لا يوجد تغيير مطلوب');
        return;
    }

    document.getElementById('modal-fix-btn').disabled=true;
    document.getElementById('modal-fix-btn').textContent='جاري الحفظ...';

    var{error}=await sb.from('questions').update(result.data).eq('id',q.id);

    if(error){
        alert('خطأ في الحفظ: '+error.message);
    }else{
        fixedIds[q.id]=true;
        fixedCount++;
        document.getElementById('s-fixed').textContent=fixedCount;

        if(result.data.question_text!==undefined) q.question_text=result.data.question_text;
        if(result.data.explanation!==undefined) q.explanation=result.data.explanation;
        if(result.data.choices!==undefined) q.choices=result.data.choices;

        closeModal();
        renderResults(document.querySelector('.filter-btn.active').dataset.f);
    }

    document.getElementById('modal-fix-btn').disabled=false;
    document.getElementById('modal-fix-btn').textContent='🔧 تطبيق الإصلاح';
}

function closeModal(){
    document.getElementById('preview-modal').classList.remove('show');
    currentPreview=null;
}

// Close modal on background click
document.getElementById('preview-modal').addEventListener('click',function(e){
    if(e.target===this)closeModal();
});

// ========================
// RENDER
// ========================

function escH(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResults(filter){
    var container=document.getElementById('results');
    var items=allBad;

    if(filter!=='all'){
        items=allBad.filter(function(b){
            return b.issues.some(function(iss){return iss.type===filter});
        });
    }

    if(items.length===0){
        container.innerHTML='<div class="empty">✅ لا توجد مشاكل'+(filter!=='all'?' في هذا التصنيف':'')+'</div>';
        return;
    }

    var html='';
    items.forEach(function(item,idx){
        var q=item.question;
        var secClass=q.section||'quant';
        var secLabel=secNames[q.section]||q.section||'غير محدد';
        var qText=(q.question_text||'').substring(0,150);
        var isFixed=fixedIds[q.id];

        // Find original index in allBad
        var origIdx=allBad.indexOf(item);

        html+='<div class="q-card'+(isFixed?' card-fixed':'')+'" data-id="'+q.id+'">';
        html+='<div class="q-header">';
        html+='<span class="q-section '+secClass+'">'+secLabel+'</span>';
        html+='<span class="q-id">ID: '+q.id+'</span>';
        html+='</div>';
        html+='<div class="q-text">'+escH(qText)+(qText.length>=150?'...':'')+'</div>';
        html+='<div class="q-issues">';

        var seen={};
        item.issues.forEach(function(iss){
            var key=iss.type+'-'+iss.field;
            if(seen[key])return;
            seen[key]=true;
            html+='<span class="issue-tag">'+iss.label+' ('+iss.field+')</span>';
        });
        html+='</div>';

        item.issues.forEach(function(iss){
            if(iss.snippet){
                html+='<div class="q-field"><strong>'+iss.field+':</strong> <span class="highlight">'+escH(iss.snippet)+'</span></div>';
            }
        });

        html+='<div class="q-actions">';
        html+='<button class="q-btn q-btn-view" onclick="viewFull('+origIdx+')">👁️ عرض كامل</button>';
        if(isFixed){
            html+='<button class="q-btn q-btn-fixed">✅ تم الإصلاح</button>';
        }else{
            html+='<button class="q-btn q-btn-fix" onclick="previewFix('+origIdx+')">🔧 معاينة وإصلاح</button>';
        }
        html+='</div>';
        html+='</div>';
    });

    container.innerHTML=html;
}

function filterResults(f,el){
    document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active')});
    el.classList.add('active');
    renderResults(f);
}

function viewFull(idx){
    var item=allBad[idx];
    var q=item.question;
    var msg='📝 السؤال:\n'+(q.question_text||'')+'\n\n';
    if(q.choices){
        msg+='الخيارات:\n';
        q.choices.forEach(function(c,i){msg+=(i+1)+'. '+(c||'')+'\n'});
        msg+='\n';
    }
    msg+='📖 الشرح:\n'+(q.explanation||'لا يوجد')+'\n\n';
    msg+='🔴 المشاكل:\n';
    item.issues.forEach(function(iss){
        msg+='- '+iss.label+' في '+iss.field+(iss.snippet?' → '+iss.snippet:'')+'\n';
    });
    alert(msg);
}

function exportCSV(){
    if(allBad.length===0){alert('لا توجد نتائج للتصدير');return}
    var csv='ID,القسم,السؤال,نوع المشكلة,الحقل\n';
    allBad.forEach(function(item){
        var q=item.question;
        item.issues.forEach(function(iss){
            csv+=q.id+','+secNames[q.section]+','
                +'"'+escCSV(q.question_text||'')+'",'
                +iss.label+','+iss.field+'\n';
        });
    });
    var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='questions-issues.csv';
    a.click();
}
function escCSV(s){return s.replace(/"/g,'""').replace(/\n/g,' ').substring(0,200)}
