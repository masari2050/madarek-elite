function log(msg, cls) {
    var el = document.getElementById('log');
    el.innerHTML += '<span class="' + (cls||'') + '">' + msg + '</span>\n';
    el.scrollTop = el.scrollHeight;
}

// 🚀 رفع تلقائي عند فتح الصفحة
window.addEventListener('DOMContentLoaded', function(){
    setTimeout(startUpload, 500);
});

async function startUpload() {
    var btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الرفع...';

    // تسجيل الدخول كأدمن
    var session = await sb.auth.getSession();
    if (!session.data.session) {
        log('❌ ما أنت مسجل دخول — روح سجل دخول بالأدمن وبعدها ارجع هنا', 'err');
        log('💡 افتح admin-login.html وسجل دخول أول', 'info');
        btn.disabled = false;
        btn.textContent = '🚀 ابدأ الرفع';
        return;
    }
    log('✅ مسجل الدخول: ' + session.data.session.user.email, 'ok');

    var success = 0, fail = 0;
    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var obj = {
            section: q.section,
            sub_section: q.sub_section,
            subject: q.sub_section,
            question_text: q.question_text,
            choices: q.choices,
            correct_index: q.correct_index,
            explanation: q.explanation || null,
            image_url: null,
            created_at: CREATED_AT
        };
        var res = await sb.from('questions').insert(obj).select('id').single();
        if (res.error) {
            log('❌ [' + (i+1) + '] ' + q.question_text.substring(0,40) + '... → ' + res.error.message, 'err');
            fail++;
        } else {
            log('✅ [' + (i+1) + '/' + questions.length + '] ' + q.sub_section + ': ' + q.question_text.substring(0,50), 'ok');
            success++;
        }
    }

    log('', '');
    log('═══════════════════════════════════════', 'info');
    log('✅ نجح: ' + success + ' | ❌ فشل: ' + fail + ' | 📊 الإجمالي: ' + questions.length, 'info');
    log('═══════════════════════════════════════', 'info');

    btn.textContent = '✅ تم الرفع!';
}
