<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>TikTok Banner</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1080px;height:1920px;overflow:hidden;font-family:'Cairo',sans-serif;background:#0d0825;position:relative}

/* Background gradient */
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,#1a0a3e 0%,#0d0825 60%,#08041a 100%)}

/* Floating particles */
@keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.2)}}
@keyframes float2{0%,100%{transform:translateY(0) scale(0.8)}50%{transform:translateY(-20px) scale(1.1)}}
@keyframes float3{0%,100%{transform:translateY(0)}50%{transform:translateY(-40px)}}
.particle{position:absolute;border-radius:50%;opacity:0.15}
.p1{width:300px;height:300px;background:radial-gradient(circle,#8b5cf6,transparent);top:200px;right:-80px;animation:float1 6s ease-in-out infinite}
.p2{width:200px;height:200px;background:radial-gradient(circle,#f97316,transparent);bottom:400px;left:-50px;animation:float2 5s ease-in-out infinite}
.p3{width:250px;height:250px;background:radial-gradient(circle,#ef4444,transparent);top:600px;left:50%;animation:float3 7s ease-in-out infinite}

/* Fire animations */
@keyframes fireFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.15)}}
@keyframes fireGlow{0%,100%{filter:drop-shadow(0 0 20px rgba(249,115,22,0.4))}50%{filter:drop-shadow(0 0 40px rgba(249,115,22,0.8))}}
@keyframes sparkRise{0%{transform:translateY(0) scale(0);opacity:0}20%{opacity:1;transform:translateY(-20px) scale(1)}100%{transform:translateY(-80px) scale(0);opacity:0}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 30px rgba(249,115,22,0.3)}50%{box-shadow:0 0 60px rgba(249,115,22,0.6),0 0 100px rgba(239,68,68,0.2)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Content container */
.content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:80px 60px;text-align:center}

/* Logo */
.logo{width:140px;height:140px;background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:32px;display:flex;align-items:center;justify-content:center;margin-bottom:50px;box-shadow:0 10px 40px rgba(99,102,241,0.3);animation:slideUp 0.8s ease}
.logo svg{width:80px;height:80px}

/* Fire emoji */
.fire-big{font-size:120px;animation:fireFloat 2.5s ease-in-out infinite;display:block;margin-bottom:30px;filter:drop-shadow(0 0 25px rgba(249,115,22,0.5))}

/* Main title */
.title{font-size:72px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:25px;animation:slideUp 0.8s ease 0.2s both;text-shadow:0 4px 30px rgba(0,0,0,0.5)}

/* Subtitle */
.subtitle{font-size:38px;font-weight:700;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:50px;animation:slideUp 0.8s ease 0.4s both}

/* Dates badges */
.dates{display:flex;gap:20px;margin-bottom:60px;animation:slideUp 0.8s ease 0.5s both;flex-wrap:wrap;justify-content:center}
.date-badge{background:linear-gradient(135deg,rgba(249,115,22,0.15),rgba(239,68,68,0.1));border:2px solid rgba(249,115,22,0.3);border-radius:16px;padding:14px 28px;color:#fb923c;font-size:32px;font-weight:800}

/* CTA Button */
.cta{background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;font-size:42px;font-weight:900;padding:28px 70px;border-radius:60px;border:none;cursor:pointer;animation:pulseGlow 2s infinite,slideUp 0.8s ease 0.6s both;text-decoration:none;display:inline-block;letter-spacing:1px}

/* Sparks */
.spark{position:absolute;width:6px;height:6px;border-radius:50%;background:#f97316;animation:sparkRise 2.5s infinite}

/* Shimmer line */
.shimmer-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(249,115,22,0.8),rgba(239,68,68,0.6),transparent);background-size:200% 100%;animation:shimmer 3s infinite linear}

/* Bottom branding */
.brand{position:absolute;bottom:60px;left:0;right:0;text-align:center;animation:slideUp 0.8s ease 0.8s both}
.brand-text{color:rgba(255,255,255,0.3);font-size:28px;font-weight:700}
.brand-url{color:rgba(139,92,246,0.5);font-size:24px;font-weight:700;margin-top:8px;display:block}

/* Days label */
.days-label{color:rgba(255,255,255,0.35);font-size:30px;margin-bottom:15px;animation:slideUp 0.8s ease 0.45s both}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>
<div class="shimmer-line"></div>

<!-- Sparks -->
<span class="spark" style="top:350px;left:150px;animation-delay:0s"></span>
<span class="spark" style="top:380px;right:200px;animation-delay:0.5s;background:#ef4444"></span>
<span class="spark" style="top:900px;left:300px;animation-delay:1s"></span>
<span class="spark" style="top:920px;right:250px;animation-delay:1.5s;background:#fbbf24"></span>
<span class="spark" style="top:350px;left:500px;animation-delay:0.8s;background:#ef4444"></span>
<span class="spark" style="top:900px;left:600px;animation-delay:1.2s"></span>

<div class="content">
    <div class="logo">
        <svg viewBox="0 0 100 100" fill="none">
            <path d="M50 15 L75 35 L70 65 L50 80 L30 65 L25 35 Z" stroke="rgba(139,92,246,0.6)" stroke-width="2" fill="none"/>
            <path d="M50 25 L65 38 L62 58 L50 68 L38 58 L35 38 Z" fill="rgba(139,92,246,0.3)"/>
            <text x="50" y="55" text-anchor="middle" fill="#a78bfa" font-size="28" font-weight="900" font-family="Cairo">م</text>
        </svg>
    </div>

    <span class="fire-big">🔥</span>

    <h1 class="title">اختبر نفسك<br>بأسئلة جات فعلاً</h1>

    <p class="subtitle">من أحدث تسريبات الأيام الماضية</p>

    <div class="days-label">تجميعات أيام:</div>
    <div class="dates">
        <span class="date-badge">٢٤ مارس</span>
        <span class="date-badge">٢٦ مارس</span>
        <span class="date-badge">٢٨ مارس</span>
    </div>

    <a class="cta">ابدأ الحين 🔥</a>

    <div class="brand">
        <div class="brand-text">مدارك النخبة</div>
        <span class="brand-url">madarekelite.com</span>
    </div>
</div>
</body>
</html>
