<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الإدارة - مدارك النخبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        *{font-family:'Tajawal',sans-serif}
        body{background:linear-gradient(135deg,#0f0a2e 0%,#1a1145 40%,#1e1550 60%,#0d0825 100%);min-height:100vh}
        @keyframes spin-r{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        @keyframes gp{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,.35)}50%{box-shadow:0 8px 36px rgba(99,102,241,.7)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
        .logo-icon{width:52px;height:52px;border-radius:15px;background:linear-gradient(135deg,#1e1b4b,#2d2564);border:1.5px solid rgba(99,102,241,.4);display:flex;align-items:center;justify-content:center;position:relative;animation:gp 3s ease-in-out infinite;flex-shrink:0}
        .logo-ring{position:absolute;inset:3px;border-radius:12px;padding:2px;background:conic-gradient(from 330deg,rgba(99,102,241,0.9) 0deg,rgba(139,92,246,0.5) 120deg,transparent 150deg,transparent 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:spin-r 3s linear infinite;pointer-events:none}
        .logo-name{font-family:'Cairo',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(110deg,#c7d2fe 0%,#e0e7ff 20%,#818cf8 45%,#c4b5fd 70%,#c7d2fe 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;line-height:1.1}
        .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:1.5rem;animation:fadeUp .5s ease}
        .inp{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.1);border-radius:.875rem;padding:.85rem 1.1rem;color:#fff;width:100%;font-size:.95rem;transition:all .25s;outline:none}
        .inp:focus{border-color:rgba(139,92,246,.6);background:rgba(255,255,255,0.09);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
        .inp::placeholder{color:rgba(255,255,255,.2)}
        .btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:.9rem 2rem;border-radius:.875rem;font-weight:900;font-size:1rem;color:#fff;border:none;cursor:pointer;width:100%;transition:all .25s}
        .btn:hover:not(:disabled){box-shadow:0 8px 30px rgba(99,102,241,.4);transform:translateY(-1px)}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:.75rem;padding:.75rem 1rem;color:#fca5a5;font-size:.875rem;text-align:center}
        .shake{animation:shake .4s ease}
        .pass-wrap{position:relative}
        .eye-btn{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);cursor:pointer;color:rgba(255,255,255,.3);transition:.2s;background:none;border:none;padding:0}
        .eye-btn:hover{color:rgba(255,255,255,.6)}
        .spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin-r .7s linear infinite;vertical-align:middle;margin-left:6px}
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<!-- بانر عدم الصلاحية -->
<div id="deniedBanner" class="hidden fixed top-0 inset-x-0 z-50 bg-red-600 text-white text-center py-3 text-sm font-bold">
    ⛔ ما عندك صلاحية — هذي الصفحة للمسؤولين فقط
</div>

<div class="w-full max-w-md">

    <!-- لوغو -->
    <div class="flex flex-col items-center mb-8">
        <div class="flex items-center gap-3 mb-3">
            <div class="logo-icon">
                <div class="logo-ring"></div>
                <svg viewBox="0 0 36 36" width="26" height="26" fill="none">
                    <path d="M5 26 L5 14 L11.5 20 L18 7 L24.5 20 L31 14 L31 26 Z"
                        stroke="rgba(165,180,252,.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="5" y1="28.5" x2="31" y2="28.5" stroke="rgba(165,180,252,.7)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="5" cy="14" r="2.5" fill="#a5b4fc"/>
                    <circle cx="18" cy="7" r="2.5" fill="#c4b5fd"/>
                    <circle cx="31" cy="14" r="2.5" fill="#a5b4fc"/>
                </svg>
            </div>
            <div>
                <div class="logo-name">مدارك النخبة</div>
                <div style="font-size:10px;color:rgba(196,181,253,.4);margin-top:2px">حيث يُصنع التميّز</div>
            </div>
        </div>
        <h1 class="text-white font-black text-2xl">لوحة الإدارة</h1>
        <p style="color:rgba(196,181,253,.4);font-size:.85rem;margin-top:5px">دخول مخصص للمسؤولين فقط</p>
    </div>

    <!-- كارد الفورم -->
    <div class="card p-8">

        <div id="errBox" class="err-box hidden mb-5"></div>

        <div class="space-y-4">
            <div>
                <label style="color:rgba(196,181,253,.55);font-size:.85rem;display:block;margin-bottom:6px">البريد الإلكتروني</label>
                <input type="email" id="email" class="inp" placeholder="example@email.com" autocomplete="email">
            </div>
            <div>
                <label style="color:rgba(196,181,253,.55);font-size:.85rem;display:block;margin-bottom:6px">كلمة المرور</label>
                <div class="pass-wrap">
                    <input type="password" id="password" class="inp" placeholder="••••••••"
                        style="padding-left:3rem" autocomplete="current-password"
                        onkeydown="if(event.key==='Enter')doLogin()">
                    <button class="eye-btn" onclick="togglePass()" type="button">
                        <svg id="eyeIco" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button id="loginBtn" class="btn" onclick="doLogin()">
                🔐 دخول لوحة الإدارة
            </button>
        </div>

        <div style="background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.12);border-radius:.75rem;padding:.75rem 1rem;margin-top:1.5rem;text-align:center">
            <p style="color:rgba(251,191,36,.75);font-size:.8rem;font-weight:700">⚠️ هذه الصفحة للمسؤولين فقط</p>
            <p style="color:rgba(255,255,255,.25);font-size:.75rem;margin-top:3px">المحاولات غير المصرح بها يتم تسجيلها</p>
        </div>
    </div>

    <div class="text-center mt-5">
        <a href="index.html" style="color:rgba(196,181,253,.35);font-size:.85rem;text-decoration:none">← الرئيسية</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var sb=window.supabase.createClient(
    'https://czzcmbxejxbotjemyuqf.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emNtYnhlanhib3RqZW15dXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzQ0ODEsImV4cCI6MjA4NTc1MDQ4MX0.xDfG1qsDZGyUrpL44JfqOtk57dVsLaMsvIzJz1KgiR0'
);

// بانر عدم الصلاحية
if(window.location.search.includes('denied')){
    document.getElementById('deniedBanner').classList.remove('hidden');
}

// لو عنده سيشن نشط — تحقق مباشرة
(async function(){
    var{data:{session}}=await sb.auth.getSession();
    if(!session)return;
    var{data:p}=await sb.from('profiles').select('role').eq('id',session.user.id).single();
    // ══ الحل الجذري: admin أو staff كلاهم يدخلون ══
    if(p&&(p.role==='admin'||p.role==='staff')){
        location.href='admin.html';
    }
})();

function showErr(msg){
    var b=document.getElementById('errBox');
    b.textContent=msg;
    b.classList.remove('hidden');
    b.classList.remove('shake');
    void b.offsetWidth; // restart animation
    b.classList.add('shake');
}

function togglePass(){
    var inp=document.getElementById('password');
    var ico=document.getElementById('eyeIco');
    if(inp.type==='password'){
        inp.type='text';
        ico.innerHTML='<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    }else{
        inp.type='password';
        ico.innerHTML='<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
    }
}

// 🔒 حماية من brute force
var _adminAttempts = 0;
var _adminLocked = false;
var _adminLockTime = 0;

async function doLogin(){
    // 🔒 تحقق من القفل
    if(_adminLocked){
        var remaining = Math.ceil((_adminLockTime - Date.now()) / 1000);
        if(remaining > 0){ showErr('كثرت المحاولات. انتظر ' + remaining + ' ثانية'); return; }
        _adminLocked = false; _adminAttempts = 0;
    }
    var email=document.getElementById('email').value.trim();
    var pass=document.getElementById('password').value;
    var btn=document.getElementById('loginBtn');

    document.getElementById('errBox').classList.add('hidden');

    if(!email||!pass){showErr('أدخل الإيميل وكلمة المرور');return}

    btn.disabled=true;
    btn.innerHTML='<span class="spin"></span> جاري التحقق...';

    try{
        var{data,error}=await sb.auth.signInWithPassword({email,password:pass});

        if(error){
            _adminAttempts++;
            // 🔒 قفل تصاعدي: 3 محاولات=60 ثانية، 6=5 دقائق
            if(_adminAttempts >= 6){ _adminLocked=true; _adminLockTime=Date.now()+300000; showErr('تم قفل الدخول لمدة 5 دقائق — حماية أمنية'); }
            else if(_adminAttempts >= 3){ _adminLocked=true; _adminLockTime=Date.now()+60000; showErr('كثرت المحاولات — انتظر دقيقة'); }
            else { showErr('الإيميل أو كلمة المرور غلط'); }
            btn.disabled=false;
            btn.innerHTML='🔐 دخول لوحة الإدارة';
            return;
        }

        // 2. جلب الدور
        var{data:profile}=await sb.from('profiles')
            .select('role,full_name')
            .eq('id',data.user.id)
            .single();

        // ══ الحل الجذري: admin أو staff ══
        var allowed = profile && (profile.role==='admin' || profile.role==='staff');

        if(!allowed){
            await sb.auth.signOut();
            showErr('ما عندك صلاحية الدخول للوحة الإدارة');
            btn.disabled=false;
            btn.innerHTML='🔐 دخول لوحة الإدارة';
            return;
        }

        // 3. نجح
        btn.innerHTML='✅ جاري التوجيه...';
        location.href='admin.html';

    }catch(e){
        showErr('حصل خطأ غير متوقع، حاول مرة ثانية');
        btn.disabled=false;
        btn.innerHTML='🔐 دخول لوحة الإدارة';
    }
}
</script>
</body>
</html>
