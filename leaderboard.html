<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتصدرون - مدارك النخبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{font-family:'Tajawal',sans-serif}
        body{background:linear-gradient(135deg,#0f0a2e 0%,#1a1145 30%,#1e1550 50%,#151040 70%,#0d0825 100%);min-height:100vh}
        .card-glass{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px)}

        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-in{animation:fadeUp .5s ease forwards}
        .delay-1{animation-delay:.1s;opacity:0}.delay-2{animation-delay:.2s;opacity:0}.delay-3{animation-delay:.3s;opacity:0}

        @keyframes spin-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        @keyframes glow-pulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,0.25)}50%{box-shadow:0 8px 32px rgba(99,102,241,0.45)}}

        .madarek-logo{display:inline-flex;align-items:center;gap:9px;direction:rtl;text-decoration:none;user-select:none}
        .madarek-logo .icon{width:32px;height:32px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,#1e1b4b,#2d2564);border:1px solid rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;position:relative;animation:glow-pulse 3s ease-in-out infinite}
        .madarek-logo .icon .ring{position:absolute;inset:3px;border-radius:9px;padding:2px;background:conic-gradient(from 330deg,rgba(99,102,241,0.9) 0deg,rgba(139,92,246,0.5) 120deg,transparent 150deg,transparent 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:spin-ring 3s linear infinite;pointer-events:none}
        .madarek-logo .name{font-family:'Cairo',sans-serif;font-size:15px;font-weight:900;background:linear-gradient(110deg,#c7d2fe 0%,#e0e7ff 20%,#818cf8 45%,#c4b5fd 70%,#c7d2fe 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;line-height:1.1}

        .tab-btn{padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .3s ease;border:1.5px solid transparent;background:rgba(255,255,255,0.04);color:rgba(196,181,253,0.5)}
        .tab-btn:hover{background:rgba(255,255,255,0.08);color:rgba(196,181,253,0.8)}
        .tab-btn.active{background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.3);color:#a5b4fc}

        .podium-card{border-radius:16px;padding:16px 8px;text-align:center;position:relative;transition:all .3s ease}
        .rank-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;transition:background .2s;border:1px solid transparent}
        .rank-row:hover{background:rgba(255,255,255,0.04)}
        .rank-row.me{background:rgba(99,102,241,0.08);border-color:rgba(99,102,241,0.2)}

        @keyframes podium-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .podium-animate{animation:podium-up .6s ease forwards}
        .podium-delay-1{animation-delay:.15s;opacity:0}.podium-delay-2{animation-delay:.3s;opacity:0}.podium-delay-3{animation-delay:.45s;opacity:0}

        .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#818cf8;border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        .sticky-bar{position:sticky;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,rgba(15,10,46,0.98),rgba(15,10,46,0.9));backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,0.06)}
    </style>
</head>
<body class="text-white min-h-screen pb-20">

    <!-- Header -->
    <div class="px-4 py-4 flex items-center justify-between max-w-2xl mx-auto">
        <a href="dashboard.html" class="flex items-center gap-2 text-purple-300 hover:text-white transition-colors">
            <svg class="w-5 h-5 rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            <span class="text-sm font-medium">الرئيسية</span>
        </a>
        <a href="dashboard.html" class="madarek-logo">
            <div class="icon">
                <div class="ring"></div>
                <svg viewBox="0 0 36 36" width="17" height="17" fill="none">
                    <path d="M5 26 L5 14 L11.5 20 L18 7 L24.5 20 L31 14 L31 26 Z" stroke="rgba(165,180,252,0.95)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="5" y1="28.5" x2="31" y2="28.5" stroke="rgba(165,180,252,0.7)" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="5" cy="14" r="2.5" fill="#a5b4fc"/>
                    <circle cx="18" cy="7" r="2.5" fill="#c4b5fd"/>
                    <circle cx="31" cy="14" r="2.5" fill="#a5b4fc"/>
                </svg>
            </div>
            <span class="name">مدارك النخبة</span>
        </a>
        <h1 class="text-sm font-bold text-purple-300/70">المتصدرون</h1>
    </div>

    <div class="max-w-2xl mx-auto px-4">

        <!-- Title -->
        <div class="text-center mb-5 animate-in delay-1">
            <p class="text-3xl mb-1">🏆</p>
            <h2 style="font-family:'Cairo',sans-serif;font-size:22px;font-weight:900;color:#e2e8f0">لوحة المتصدرين</h2>
            <p class="text-xs mt-1" style="color:rgba(196,181,253,0.4)">تنافس مع زملائك واحصد أعلى XP</p>
        </div>

        <!-- Tabs -->
        <div class="flex justify-center gap-2 mb-6 animate-in delay-2">
            <button class="tab-btn active" data-period="week" onclick="switchTab('week',this)">هذا الأسبوع</button>
            <button class="tab-btn" data-period="month" onclick="switchTab('month',this)">هذا الشهر</button>
            <button class="tab-btn" data-period="all" onclick="switchTab('all',this)">الكل</button>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="flex flex-col items-center py-16">
            <div class="spinner"></div>
            <p class="text-purple-300/50 text-sm mt-4">جاري تحميل الترتيب...</p>
        </div>

        <!-- Empty -->
        <div id="emptyState" class="text-center py-16" style="display:none">
            <p class="text-4xl mb-3">📊</p>
            <p style="font-family:'Cairo',sans-serif;font-size:16px;font-weight:900;color:rgba(196,181,253,0.5)">لا توجد بيانات بعد</p>
            <p class="text-xs mt-2" style="color:rgba(196,181,253,0.3)">ابدأ التدريب عشان تظهر في الترتيب!</p>
        </div>

        <!-- Content -->
        <div id="leaderboardContent" style="display:none">

            <!-- Podium: Top 3 -->
            <div id="podiumSection" class="flex items-end justify-center gap-3 mb-6" style="min-height:200px">
            </div>

            <!-- Ranked list 4+ -->
            <div class="card-glass rounded-2xl p-3 mb-4 animate-in delay-3">
                <div id="rankList" class="space-y-1">
                </div>
            </div>

        </div>
    </div>

    <!-- My Rank Sticky Bar -->
    <div id="myRankBar" class="sticky-bar" style="display:none">
        <div class="max-w-2xl mx-auto flex items-center gap-3">
            <span id="myRankNum" style="font-family:'Cairo',sans-serif;font-size:18px;font-weight:900;color:#818cf8;width:36px;text-align:center"></span>
            <span id="myRankAvatar" class="text-2xl">👤</span>
            <div class="flex-1">
                <p id="myRankName" class="text-sm font-bold">أنت</p>
                <p id="myRankXP" class="text-xs" style="color:#818cf8;font-weight:700"></p>
            </div>
            <span style="font-size:11px;color:rgba(196,181,253,0.4)">ترتيبك</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="gamification.js"></script>
    <script>
        var sb = window.supabase.createClient('https://czzcmbxejxbotjemyuqf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emNtYnhlanhib3RqZW15dXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzQ0ODEsImV4cCI6MjA4NTc1MDQ4MX0.xDfG1qsDZGyUrpL44JfqOtk57dVsLaMsvIzJz1KgiR0');
        var currentUserId = null;
        var currentPeriod = 'week';
        var leaderboardCache = {};

        var medals = ['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
        var podiumColors = [
            {bg:'rgba(251,191,36,0.08)', bd:'rgba(251,191,36,0.25)', tc:'#fbbf24'},
            {bg:'rgba(192,192,192,0.06)', bd:'rgba(192,192,192,0.2)', tc:'#d1d5db'},
            {bg:'rgba(205,127,50,0.06)', bd:'rgba(205,127,50,0.2)', tc:'#d97706'}
        ];
        var podiumOrder = [1, 0, 2];
        var podiumHeights = ['140px', '170px', '120px'];

        async function init(){
            try{
                var res = await sb.auth.getSession();
                var session = res.data && res.data.session;
                if(!session){ window.location.href = 'login.html'; return; }
                currentUserId = session.user.id;
                await loadLeaderboard('week');
            }catch(e){
                window.location.href = 'login.html';
            }
        }

        function switchTab(period, btn){
            currentPeriod = period;
            document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
            btn.classList.add('active');
            loadLeaderboard(period);
        }

        async function loadLeaderboard(period){
            document.getElementById('loadingState').style.display = '';
            document.getElementById('leaderboardContent').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('myRankBar').style.display = 'none';

            if(leaderboardCache[period]){
                renderLeaderboard(leaderboardCache[period]);
                return;
            }

            try{
                var res = await sb.rpc('get_leaderboard', {period: period});
                if(res.error) throw res.error;
                leaderboardCache[period] = res.data || [];
                renderLeaderboard(res.data || []);
            }catch(e){
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('emptyState').style.display = '';
            }
        }

        function renderLeaderboard(data){
            document.getElementById('loadingState').style.display = 'none';

            if(!data || !data.length){
                document.getElementById('emptyState').style.display = '';
                return;
            }

            document.getElementById('leaderboardContent').style.display = '';

            // === Podium (Top 3) ===
            var podiumHTML = '';
            var top3 = data.slice(0, 3);

            podiumOrder.forEach(function(dataIdx, visualIdx){
                var u = top3[dataIdx];
                if(!u){
                    podiumHTML += '<div style="flex:1"></div>';
                    return;
                }
                var pc = podiumColors[dataIdx];
                var isMe = u.user_id === currentUserId;
                var height = podiumHeights[visualIdx];
                var emojiSize = dataIdx === 0 ? '42px' : '34px';
                var medalSize = dataIdx === 0 ? '28px' : '22px';
                var nameColor = isMe ? '#a5b4fc' : '#e2e8f0';
                var delayClass = 'podium-animate podium-delay-' + (visualIdx + 1);

                podiumHTML += '<div class="' + delayClass + '" style="flex:1;min-width:0">'
                    + '<div class="podium-card" style="background:' + pc.bg + ';border:1px solid ' + pc.bd + ';min-height:' + height + '">'
                    + '<p style="font-size:' + medalSize + ';margin-bottom:4px">' + medals[dataIdx] + '</p>'
                    + '<p style="font-size:' + emojiSize + ';line-height:1;margin-bottom:6px">' + (u.avatar_emoji || '\uD83D\uDC64') + '</p>'
                    + '<p style="font-family:Cairo,sans-serif;font-size:12px;font-weight:900;color:' + nameColor + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
                    + (u.display_name || '\u0637\u0627\u0644\u0628') + (isMe ? ' (\u0623\u0646\u062A)' : '') + '</p>'
                    + '<p style="font-family:Cairo,sans-serif;font-size:16px;font-weight:900;color:' + pc.tc + ';margin-top:4px">' + Number(u.xp || 0).toLocaleString('ar-SA') + '</p>'
                    + '<p style="font-size:9px;color:rgba(196,181,253,0.35)">XP</p>'
                    + '</div></div>';
            });

            document.getElementById('podiumSection').innerHTML = podiumHTML;

            // === Ranked list (4+) ===
            var listHTML = '';
            var rest = data.slice(3);

            if(!rest.length){
                listHTML = '<p style="text-align:center;padding:16px;color:rgba(196,181,253,0.3);font-size:12px">\u0644\u0627 \u064A\u0648\u062C\u062F \u0645\u0632\u064A\u062F \u0645\u0646 \u0627\u0644\u0645\u062A\u0633\u0627\u0628\u0642\u064A\u0646</p>';
            }

            rest.forEach(function(u){
                var isMe = u.user_id === currentUserId;
                var meClass = isMe ? ' me' : '';
                listHTML += '<div class="rank-row' + meClass + '">'
                    + '<span style="font-family:Cairo,sans-serif;font-size:15px;font-weight:900;color:rgba(196,181,253,0.4);width:28px;text-align:center">' + u.rank + '</span>'
                    + '<span style="font-size:22px">' + (u.avatar_emoji || '\uD83D\uDC64') + '</span>'
                    + '<span style="flex:1;font-size:13px;font-weight:700;color:' + (isMe ? '#a5b4fc' : '#e2e8f0') + ';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'
                    + (u.display_name || '\u0637\u0627\u0644\u0628') + (isMe ? ' (\u0623\u0646\u062A)' : '') + '</span>'
                    + '<span style="font-family:Cairo,sans-serif;font-size:13px;font-weight:900;color:#818cf8">' + Number(u.xp || 0).toLocaleString('ar-SA') + ' XP</span>'
                    + '</div>';
            });

            document.getElementById('rankList').innerHTML = listHTML;

            // === My rank sticky bar ===
            var myEntry = null;
            data.forEach(function(u){ if(u.user_id === currentUserId) myEntry = u; });

            if(myEntry && Number(myEntry.rank) > 3){
                document.getElementById('myRankNum').textContent = '#' + myEntry.rank;
                document.getElementById('myRankAvatar').textContent = myEntry.avatar_emoji || '\uD83D\uDC64';
                document.getElementById('myRankName').textContent = (myEntry.display_name || '\u0623\u0646\u062A') + ' (\u0623\u0646\u062A)';
                document.getElementById('myRankXP').textContent = Number(myEntry.xp || 0).toLocaleString('ar-SA') + ' XP';
                document.getElementById('myRankBar').style.display = '';
            } else if(!myEntry){
                document.getElementById('myRankNum').textContent = '-';
                document.getElementById('myRankAvatar').textContent = '\uD83D\uDC64';
                document.getElementById('myRankName').textContent = '\u0623\u0646\u062A';
                document.getElementById('myRankXP').textContent = '0 XP \u2014 \u0627\u0628\u062F\u0623 \u0627\u0644\u062A\u062F\u0631\u064A\u0628!';
                document.getElementById('myRankBar').style.display = '';
            }
        }

        init();
    </script>
    <script src="banner.js"></script>
<script src="analytics.js"></script>
<script src="engagement.js"></script></body>
</html>
