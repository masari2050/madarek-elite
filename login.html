    <style>
        *{font-family:'Tajawal',sans-serif}
        body{background:linear-gradient(135deg,#0f0a2e 0%,#1a1145 30%,#1e1550 50%,#151040 70%,#0d0825 100%);min-height:100vh;display:block;margin:0;padding:0}
        .login-wrapper{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
        .card-glass{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:1.5rem}
        .input-dark{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:.75rem;padding:.75rem 1rem;color:#fff;width:100%;transition:all .2s}
        .input-dark:focus{outline:none;border-color:rgba(139,92,246,0.5);box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
        .input-dark::placeholder{color:rgba(255,255,255,0.25)}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);transition:all .3s;box-shadow:0 8px 25px rgba(99,102,241,0.3)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(99,102,241,0.5)}
        .btn-primary:disabled{opacity:.5;transform:none!important}
        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:.875rem;font-weight:700;z-index:999;animation:slideDown .4s ease}
        .toast-error{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
        @keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .animate-in{animation:fadeUp .5s ease forwards}.delay-1{animation-delay:.1s;opacity:0}.delay-2{animation-delay:.2s;opacity:0}

        @keyframes spin-ring{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
        @keyframes glow-pulse{0%,100%{box-shadow:0 4px 20px rgba(99,102,241,0.35)}50%{box-shadow:0 8px 32px rgba(99,102,241,0.6)}}
        .madarek-logo{display:inline-flex;align-items:center;gap:10px;direction:rtl;text-decoration:none;user-select:none}
        .madarek-logo .icon{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#1e1b4b,#2d2564);border:1.5px solid rgba(99,102,241,0.35);display:flex;align-items:center;justify-content:center;position:relative;animation:glow-pulse 3s ease-in-out infinite}
        .madarek-logo .icon .ring{position:absolute;inset:3px;border-radius:9px;padding:2px;background:conic-gradient(from 330deg,rgba(99,102,241,0.9) 0deg,rgba(139,92,246,0.5) 120deg,transparent 150deg,transparent 360deg);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask-composite:exclude;animation:spin-ring 3s linear infinite;pointer-events:none}
        .madarek-logo .name{font-family:'Cairo',sans-serif;font-size:22px;font-weight:900;background:linear-gradient(110deg,#c7d2fe 0%,#e0e7ff 20%,#818cf8 45%,#c4b5fd 70%,#c7d2fe 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;line-height:1.1}
        .madarek-logo .tag{font-family:'Tajawal',sans-serif;font-size:9px;font-weight:500;color:rgba(196,181,253,0.5);margin-top:1px;display:block}
    </style>

<body class="text-white" data-page="login" style="margin:0;padding:0">

    <div class="login-wrapper"><div id="toast" class="toast hidden"></div>

    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8 animate-in delay-1">
            <!-- Icon only - large centered -->
            <a href="index.html" class="flex flex-col items-center gap-3 mb-5" style="text-decoration:none">
                <div style="width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#1e1b4b,#2d2564);border:1.5px solid rgba(99,102,241,0.35);display:flex;align-items:center;justify-content:center;position:relative;animation:glow-pulse 3s ease-in-out infinite">
                    <div style="position:absolute;inset:3px;border-radius:14px;border:2px solid transparent;border-top-color:rgba(99,102,241,0.85);border-right-color:rgba(139,92,246,0.4);animation:spin-ring 3s linear infinite;pointer-events:none"></div>

                        <line x1="5" y1="28.5" x2="31" y2="28.5" stroke="rgba(165,180,252,0.7)" stroke-width="2.5" stroke-linecap="round"/>
                        <circle cx="5"  cy="14" r="2.5" fill="#a5b4fc"/>
                        <circle cx="18" cy="7"  r="2.5" fill="#c4b5fd"/>

                    </svg>
                </div>
                <div style="text-align:center">
                    <div style="font-family:'Cairo',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(110deg,#c7d2fe 0%,#e0e7ff 20%,#818cf8 45%,#c4b5fd 70%,#c7d2fe 100%);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite;line-height:1.1">مدارك النخبة</div>

        <!-- Form Card -->
        <div class="card-glass p-6 animate-in delay-2">
            <form id="loginForm" class="space-y-4">

                    <label class="block text-purple-300/60 text-xs font-medium mb-1.5">البريد الإلكتروني</label>

                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>

            </div>
            <div class="text-center mt-5">
                <p class="text-purple-200/70 text-xs">ما عندك حساب؟ <a href="register.html" class="text-indigo-400 font-bold hover:underline">سجّل الآن</a></p>
            </div>
        </div>

        <div class="text-center mt-4">

        </div>

</div>
    <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="session-keeper.js"></script>
    <script src="biometric.js"></script>
    <script>
        // ── الخطوة الأولى: اقرأ التوكنات/المعرّفات قبل createClient ──
        var _rawAt = null, _rawRt = null, _isRecoveryUrl = false, _tokenHash = null;
        (function() {
            try {
                var q = new URLSearchParams(window.location.search);
                // Method 1: token_hash مباشرة (قالب إيميل مخصص — الأقوى)
                if (q.get('token_hash') && q.get('type') === 'recovery') {
                    _isRecoveryUrl = true;
                    _tokenHash = q.get('token_hash');
                    return;
                }
                // Method 2: Implicit flow — tokens in hash
                var h = new URLSearchParams(window.location.hash.substring(1));
                if (h.get('type') === 'recovery') {
                    _isRecoveryUrl = true;
                    _rawAt = h.get('access_token');
                    _rawRt = h.get('refresh_token');
                    return;
                }
                // Method 3: PKCE flow — code in query string
                if (q.get('type') === 'recovery' || q.has('code')) {
                    _isRecoveryUrl = true;
                }
            } catch(e) {}
        })();

        // implicit flow — يحط التوكنات في الـ hash مباشرة (يشتغل مع Safari/Mail.app)
        const sb = window.supabase.createClient(
            'https://czzcmbxejxbotjemyuqf.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6emNtYnhlanhib3RqZW15dXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzQ0ODEsImV4cCI6MjA4NTc1MDQ4MX0.xDfG1qsDZGyUrpL44JfqOtk57dVsLaMsvIzJz1KgiR0',
            { auth: { flowType: 'implicit' } }
        );
        function forgotPassword() {
            // لو الإيميل مكتوب بالفورم — نعبيه تلقائي
            var loginEmail = document.getElementById('email').value.trim();
            var forgotInput = document.getElementById('forgotEmail');
            if (loginEmail) forgotInput.value = loginEmail;
            document.getElementById('forgotResult').classList.add('hidden');
            document.getElementById('forgotModal').classList.remove('hidden');
            setTimeout(function(){ forgotInput.focus(); }, 200);
        }
        async function sendResetLink() {
            var email = document.getElementById('forgotEmail').value.trim();
            var result = document.getElementById('forgotResult');
            var btn = document.getElementById('forgotSendBtn');
            if (!email) { result.textContent = 'اكتب إيميلك أول'; result.style.color = '#f87171'; result.style.background = 'rgba(248,113,113,0.1)'; result.classList.remove('hidden'); return; }
            btn.disabled = true; btn.textContent = 'جاري الإرسال...';
            try {
                var { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: 'https://madarekelite.com/login.html'
                });
                if (error) throw error;
                result.textContent = 'تم إرسال رابط التغيير على ' + email + ' ✅';
                result.style.color = '#4ade80'; result.style.background = 'rgba(74,222,128,0.1)';
                result.classList.remove('hidden');
                btn.textContent = 'تم الإرسال ✅';
                setTimeout(function(){ document.getElementById('forgotModal').classList.add('hidden'); btn.disabled = false; btn.textContent = 'أرسل رابط التغيير'; }, 3000);
            } catch(e) {
                result.textContent = 'ما قدرنا نرسل — تأكد من الإيميل وحاول مرة ثانية';
                result.style.color = '#f87171'; result.style.background = 'rgba(248,113,113,0.1)';
                result.classList.remove('hidden');
                btn.disabled = false; btn.textContent = 'أرسل رابط التغيير';
            }
        }

        function togglePass() {
            var f = document.getElementById('password');
            f.type = f.type === 'password' ? 'text' : 'password';
        }
        function showToast(msg) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast toast-error';
            setTimeout(function() { t.classList.add('hidden'); }, 3500);
        }
        // ── استقبال رابط إعادة تعيين الباسورد ──
        var _recoverySession = null;
        var _recoveryTimeout = null;

        function _onRecoveryReady(session) {
            clearTimeout(_recoveryTimeout);
            _recoverySession = session;
            var btn = document.getElementById('resetSaveBtn');
            var res = document.getElementById('resetResult');
            if (btn) btn.disabled = false;
            res.classList.add('hidden');
            document.getElementById('resetModal').classList.remove('hidden');
        }

        // سجّل المستمع — يستقبل PASSWORD_RECOVERY أو SIGNED_IN (بعض الإصدارات تفعله)
        sb.auth.onAuthStateChange(function(event, session) {
            if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && _isRecoveryUrl)) {
                _onRecoveryReady(session);
            }
        });

        // لو كانت recovery URL — تأكد من الجلسة بطرق متعددة
        if (_isRecoveryUrl) {
            (async function() {
                // 1. token_hash — verifyOtp مباشرة (الأقوى — ما يحتاج localStorage)
                if (_tokenHash) {
                    try {
                        var vRes = await sb.auth.verifyOtp({ token_hash: _tokenHash, type: 'recovery' });
                        if (!vRes.error && vRes.data && vRes.data.session) {
                            _onRecoveryReady(vRes.data.session);
                            return;
                        }
                    } catch(e) {}
                }
                // 2. لو Supabase عالج الهاش تلقائياً (implicit flow)
                var res = await sb.auth.getSession();
                if (res.data && res.data.session) {
                    _onRecoveryReady(res.data.session);
                    return;
                }
                // 3. استخدم الـ raw tokens المحفوظة قبل createClient (implicit flow)
                if (_rawAt && _rawRt) {
                    var setRes = await sb.auth.setSession({ access_token: _rawAt, refresh_token: _rawRt }).catch(function(){ return {}; });
                    if (setRes.data && setRes.data.session) {
                        _onRecoveryReady(setRes.data.session);
                        return;
                    }
                }
                // 4. Fallback — اعرض المودال لكن وقّف زر الحفظ حتى تجي الجلسة
                document.getElementById('resetModal').classList.remove('hidden');
                var saveBtn = document.getElementById('resetSaveBtn');
                var resEl = document.getElementById('resetResult');
                if (saveBtn) saveBtn.disabled = true;
                resEl.textContent = 'جاري التحقق من الرابط...';
                resEl.style.color = '#a78bfa';
                resEl.style.background = 'rgba(167,139,250,0.1)';
                resEl.classList.remove('hidden');
                // Polling
                var _pollInterval = setInterval(async function() {
                    if (_recoverySession) { clearInterval(_pollInterval); return; }
                    try {
                        var pr = await sb.auth.getSession();
                        if (pr.data && pr.data.session) {
                            clearInterval(_pollInterval);
                            clearTimeout(_recoveryTimeout);
                            _onRecoveryReady(pr.data.session);
                        }
                    } catch(e) {}
                }, 1000);
                // Timeout — 90 ثانية
                _recoveryTimeout = setTimeout(function() {
                    clearInterval(_pollInterval);
                    if (!_recoverySession) {
                        resEl.textContent = 'انتهت صلاحية الرابط — اضغط "نسيت كلمة السر" مرة ثانية';
                        resEl.style.color = '#f87171';
                        resEl.style.background = 'rgba(248,113,113,0.1)';
                        resEl.classList.remove('hidden');
                        if (saveBtn) saveBtn.disabled = true;
                    }
                }, 90000);
            })();
        }

        async function saveNewPass() {
            var p1 = document.getElementById('newPass').value;
            var p2 = document.getElementById('confirmPass').value;
            var res = document.getElementById('resetResult');
            if (!p1 || p1.length < 6) { res.textContent = 'كلمة السر لازم تكون 6 أحرف على الأقل'; res.style.color = '#f87171'; res.classList.remove('hidden'); return; }
            if (p1 !== p2) { res.textContent = 'كلمة السر ما تطابقت'; res.style.color = '#f87171'; res.classList.remove('hidden'); return; }
            try {
                // جرّب مباشرة — الجلسة شغالة تلقائياً بعد PASSWORD_RECOVERY
                var { error } = await sb.auth.updateUser({ password: p1 });

                // لو فشل بسبب جلسة — جرّب تفعيلها يدوياً
                if (error && (error.message.includes('Auth') || error.message.includes('JWT') || error.message.includes('session') || error.status === 401)) {
                    var session = null;
                    // محاولة 1: _recoverySession من onAuthStateChange
                    if (_recoverySession && _recoverySession.access_token) {
                        var sr = await sb.auth.setSession({ access_token: _recoverySession.access_token, refresh_token: _recoverySession.refresh_token }).catch(function(){ return {}; });
                        if (sr.data && sr.data.session) session = sr.data.session;
                    }
                    // محاولة 2: raw tokens من الهاش
                    if (!session && _rawAt && _rawRt) {
                        var sr2 = await sb.auth.setSession({ access_token: _rawAt, refresh_token: _rawRt }).catch(function(){ return {}; });
                        if (sr2.data && sr2.data.session) session = sr2.data.session;
                    }
                    if (!session) throw new Error('انتهت صلاحية الرابط');
                    var { error: error2 } = await sb.auth.updateUser({ password: p1 });
                    if (error2) throw error2;
                } else if (error) {
                    throw error;
                }

                res.textContent = 'تم تغيير كلمة السر بنجاح! جاري تحويلك...';
                res.classList.remove('hidden');
                res.style.color = '#4ade80';
                setTimeout(function(){ window.location.href = 'dashboard.html'; }, 1500);
            } catch(e) {
                var msg = e.message || '';
                res.textContent = (msg.includes('انتهت') || msg.includes('JWT') || msg.includes('session') || msg.includes('expired'))
                    ? 'انتهت صلاحية الرابط — اضغط "نسيت كلمة السر" مرة ثانية'
                    : 'ما قدرنا نغير — ' + msg;
                res.classList.remove('hidden');
                res.style.color = '#f87171';
            }
        }

        (async function() {
            // لو كان رابط recovery (hash أو PKCE) لا تحول للداشبورد
            if (_isRecoveryUrl) return;
            var session = await window._madarekRestoreSession(sb);
            if (session) {
                localStorage.setItem('khawariz_user', JSON.stringify({ id: session.user.id, email: session.user.email, name: session.user.user_metadata?.name || '' }));
                window.location.href = 'dashboard.html';
            }
        })();
        // 🔒 حماية من محاولات تسجيل الدخول المتكررة (brute force)
        var _loginAttempts = 0;
        var _loginLocked = false;
        var _loginLockTime = 0;

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            // 🔒 تحقق من القفل
            if(_loginLocked){
                var remaining = Math.ceil((_loginLockTime - Date.now()) / 1000);
                if(remaining > 0){ showToast('كثرت المحاولات. انتظر ' + remaining + ' ثانية'); return; }
                _loginLocked = false; _loginAttempts = 0;
            }
            var em = document.getElementById('email').value.trim();
            var p = document.getElementById('password').value;
            if (!em || !p) { showToast('الرجاء ملء جميع الحقول'); return; }
            var btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.textContent = 'جاري الدخول...';
            try {
                var { data, error } = await sb.auth.signInWithPassword({ email: em, password: p });
                if (error) throw error;
                _loginAttempts = 0; // نجاح — نصفّر العداد
                localStorage.setItem('khawariz_user', JSON.stringify({ id: data.user.id, email: data.user.email, name: data.user.user_metadata?.name || '' }));
                // 🔐 عرض prompt البصمة (في التطبيق فقط)
                if(window._biometric && window._biometric.promptEnable){
                    try { await window._biometric.promptEnable(); } catch(e){}
                }
                window.location.href = 'dashboard.html';
            } catch (error) {
                _loginAttempts++;
                // 🔒 بعد 5 محاولات فاشلة — قفل 30 ثانية، بعد 10 — قفل 120 ثانية
                if(_loginAttempts >= 10){ _loginLocked = true; _loginLockTime = Date.now() + 120000; showToast('كثرت المحاولات الخاطئة. حاول بعد دقيقتين'); }
                else if(_loginAttempts >= 5){ _loginLocked = true; _loginLockTime = Date.now() + 30000; showToast('كثرت المحاولات. انتظر 30 ثانية'); }
                else {
                    // 🔒 رسالة موحّدة (ما نفرّق بين بريد غلط وباسورد غلط)
                    showToast('البريد أو كلمة المرور غلط');
                }
                btn.disabled = false; btn.textContent = 'تسجيل الدخول';
            }
        });
    </script>

    <!-- مودال نسيت كلمة السر (إدخال الإيميل) -->
    <div id="forgotModal" class="hidden fixed inset-0 z-[999] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)">
        <div class="w-full max-w-sm rounded-3xl p-7" style="background:linear-gradient(135deg,#1a1145,#1e1550);border:1px solid rgba(139,92,246,0.3)">
            <h2 class="text-xl font-black text-white text-center mb-2">نسيت كلمة السر؟</h2>
            <p class="text-purple-200/60 text-xs text-center mb-6">اكتب إيميلك وبنرسل لك رابط تغيير كلمة السر</p>
            <input id="forgotEmail" type="email" placeholder="بريدك الإلكتروني" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-sm mb-4 outline-none focus:border-indigo-400" style="direction:ltr;text-align:left" autocomplete="email">
            <button id="forgotSendBtn" onclick="sendResetLink()" class="w-full py-3 rounded-xl font-bold text-sm text-white" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">أرسل رابط التغيير</button>
            <div id="forgotResult" class="hidden text-center mt-3 text-xs rounded-xl py-2 px-3"></div>
            <button onclick="document.getElementById('forgotModal').classList.add('hidden')" class="w-full mt-3 py-2 text-purple-300/50 text-xs hover:text-purple-300/80 transition">إلغاء</button>
        </div>
    </div>

    <!-- مودال تغيير الباسورد (بعد الضغط على الرابط من الإيميل) -->
    <div id="resetModal" class="hidden fixed inset-0 z-[999] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)">
        <div class="w-full max-w-sm rounded-3xl p-7" style="background:linear-gradient(135deg,#1a1145,#1e1550);border:1px solid rgba(139,92,246,0.3)">
            <h2 class="text-xl font-black text-white text-center mb-2">تغيير كلمة السر</h2>
            <p class="text-purple-200/60 text-xs text-center mb-6">اكتب كلمة السر الجديدة</p>
            <input id="newPass" type="password" placeholder="كلمة السر الجديدة" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-sm mb-3 outline-none focus:border-indigo-400" style="direction:rtl">
            <input id="confirmPass" type="password" placeholder="تأكيد كلمة السر" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white text-sm mb-5 outline-none focus:border-indigo-400" style="direction:rtl">
            <button id="resetSaveBtn" onclick="saveNewPass()" class="w-full py-3 rounded-xl font-bold text-sm text-white" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)">حفظ كلمة السر الجديدة</button>
            <div id="resetResult" class="hidden text-center mt-3 text-xs text-green-400"></div>
        </div>
    </div>

        <script src="banner.js"></script>
    <script src="whatsapp-widget.js"></script>
<script src="analytics.js"></script>
<script src="engagement.js"></script></body>
</html>
